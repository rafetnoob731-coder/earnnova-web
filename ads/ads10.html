:root{--bg:#0A0E1A;--card:rgba(15,23,42,0.7);--gold:#d4af37;--emerald:#10B981;--amber:#F59E0B;--text:#e2e8f0;--text-muted:#64748b;--danger:#EF4444}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.ad-progress{width:100%;height:4px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;margin-bottom:8px}
.ad-progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--emerald));border-radius:4px;transition:width 0.3s ease;width:0%}

.hidden{display:none!important}

.toast.show{opacity:1}

<script>
// ===== TOKEN & REWARD SYSTEM =====
var urlParams = new URLSearchParams(window.location.search);
var token = urlParams.get('token') || '';
var userId = urlParams.get('uid') || '';
var adReward = 0.200;
var HIGH_ADS_REWARD = 0.200;
var adDuration = 60;
var timerSeconds = adDuration;
var adCompleted = false;
var timerInterval = null;
var progressCircle = document.getElementById('timerProgress');
var timerDisplay = document.getElementById('timerDisplay');
var progressFill = document.getElementById('progressFill');

function showToast(msg, type) {
  var t = document.getElementById('toastMsg');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.background = type === 'error' ? 'rgba(239,68,68,0.12)' : type === 'success' ? 'rgba(16,185,129,0.12)' : 'rgba(212,175,55,0.12)';
  t.style.borderColor = type === 'error' ? 'rgba(239,68,68,0.15)' : type === 'success' ? 'rgba(16,185,129,0.15)' : 'rgba(212,175,55,0.15)';
  t.style.color = type === 'error' ? '#EF4444' : type === 'success' ? 'var(--emerald)' : 'var(--gold)';
  setTimeout(function(){t.style.display='none'}, 3000);
}

function startTimer() {
  timerSeconds = adDuration;
  adCompleted = false;
  document.getElementById('skipBtn').textContent = '⏳ Watching...';
  document.getElementById('skipBtn').disabled = true;
  document.getElementById('skipBtn').style.opacity = '0.5';
  document.getElementById('adStatus').textContent = '⏳ Watching ad... ' + timerSeconds + 's';
  
  var total = adDuration;
  var circumference = 157;
  
  timerInterval = setInterval(function() {
    timerSeconds--;
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerSeconds = 0;
      adCompleted = true;
      document.getElementById('adStatus').textContent = '✅ Ad complete! Tap to earn +$' + adReward.toFixed(3);
      document.getElementById('skipBtn').textContent = '✕ Close';
      document.getElementById('skipBtn').disabled = false;
      document.getElementById('skipBtn').style.opacity = '1';
      document.getElementById('completeBtn').classList.remove('hidden');
      return;
    }
    timerDisplay.textContent = timerSeconds;
    var progress = (total - timerSeconds) / total;
    progressCircle.style.strokeDashoffset = circumference * (1 - progress);
    progressFill.style.width = (progress * 100) + '%';
    document.getElementById('adStatus').textContent = '⏳ ' + timerSeconds + 's remaining...';
  }, 1000);
}

function completeAdTask() {
  if (!adCompleted) {
    showToast('⏳ Please wait for the timer to finish', 'error');
    return;
  }
  
  // Credit reward
  var bal = parseFloat(localStorage.getItem('en_bal') || '0');
  bal += adReward;
  localStorage.setItem('en_bal', String(bal));
  
  var earned = parseFloat(localStorage.getItem('en_earned') || '0');
  earned += adReward;
  localStorage.setItem('en_earned', String(earned));
  localStorage.setItem('en_today', String((parseFloat(localStorage.getItem('en_today')||'0') + adReward)));
  localStorage.setItem('en_watched', String((parseInt(localStorage.getItem('en_watched')||'0') + 1)));
  
  document.getElementById('adStatus').textContent = '🎉 +$' + adReward.toFixed(3) + ' credited!';
  document.getElementById('completeBtn').textContent = '✅ Done! +$' + adReward.toFixed(3);
  document.getElementById('completeBtn').disabled = true;
  showToast('🎉 +$' + adReward.toFixed(3) + ' earned!', 'success');
  
  // Update Firestore via token if available
  if (token) {
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://earnnova-web.vercel.app/api/credit', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.send(JSON.stringify({token: token, reward: adReward, type: 'ads10'}));
    } catch(e) {}
  }
  
  // Update UI
  setTimeout(function() { window.location.href = '../earn.html'; }, 2000);
}

function skipAd() {
  if (!adCompleted) {
    showToast('⏳ Complete all 10 quiz questions first!', 'error');
    return;
  }
  window.location.href = '../earn.html';
}

// Initialize - show start button
document.getElementById('adStatus').textContent = '🎬 Tap Start to begin';
document.getElementById('skipBtn').textContent = '✕ Cancel';
document.getElementById('skipBtn').onclick = function() { window.location.href = '../earn.html'; };

// Auto-start timer
document.getElementById('adStatus').textContent = '⏳ Loading...';
setTimeout(startTimer, 1000);

console.log('EARNNOVA Ad | Type: ads10 | Reward: $' + adReward + ' | Token: ' + token);
</script>
