<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Memory Match | EARNNOVA</title>
<style>
:root{
  --bg:#0F172A;--bg2:#0A0E1A;--card:rgba(255,255,255,0.03);--gold:#d4af37;--emerald:#10B981;--amber:#F59E0B;
  --text:#F0F0F4;--text-muted:rgba(240,240,244,0.4);--radius:12px;--font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.header{
  display:flex;align-items:center;padding:10px 14px;gap:10px;
  background:rgba(15,23,42,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.04);position:sticky;top:0;z-index:100;
}
.header .back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:0.2s;flex-shrink:0;text-decoration:none;color:var(--text)}
.header .back:hover{background:rgba(255,255,255,0.08)}
.header .title{flex:1;font-size:15px;font-weight:700;color:var(--gold)}
.header .balance{padding:6px 12px;border-radius:8px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.15);font-size:12px;font-weight:700;color:var(--emerald);white-space:nowrap}
.header .ip-badge{padding:4px 10px;border-radius:6px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.1);font-size:10px;font-weight:600;color:var(--gold);white-space:nowrap}
.game-container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;position:relative}
.game-container canvas{border-radius:var(--radius);background:var(--bg2);max-width:100%;height:auto !important}
.game-controls{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.game-controls button{
  padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:0.2s;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:var(--text);
}
.game-controls button.primary{background:rgba(212,175,55,0.1);border-color:rgba(212,175,55,0.15);color:var(--gold)}
.game-controls button.primary:hover{background:rgba(212,175,55,0.15)}
.game-controls button.danger{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.12);color:#EF4444}
.status{padding:8px 14px;margin-top:8px;border-radius:8px;background:var(--card);border:1px solid rgba(255,255,255,0.04);font-size:11px;color:var(--text-muted);text-align:center}
.status .earned{color:var(--emerald);font-weight:700}
.ip-info{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  padding:6px 14px;border-radius:100px;
  background:rgba(15,23,42,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.04);
  font-size:10px;color:var(--text-muted);white-space:nowrap;z-index:50;
}
.ip-info strong{color:var(--gold)}
@media(max-width:400px){.header .ip-badge{display:none}
</style>
</head>
<body>
<div class="header">
  <a href="../earn.html" class="back">тА╣</a>
  <span class="title">ЁЯза Memory Match</span>
  <span class="ip-badge" id="ipBadge">ЁЯУН IP...</span>
  <span class="balance" id="balanceDisplay">$0.00</span>
</div>
<div class="game-container" id="gameContainer">
  <canvas id="gameCanvas" width="320" height="480" style="width:320px;height:480px"></canvas>
  <div class="game-controls" id="gameControls">
    <button class="primary" id="startBtn">тЦ╢ Start Game</button>
    <button id="restartBtn" style="display:none">ЁЯФД Play Again</button>
  </div>
  <div class="status" id="gameStatus">Score: <span id="scoreDisplay">0</span> | Reward: <span class="earned" id="rewardDisplay">$0.000</span> | <span id="gamesPlayed">0</span> played</div>
</div>
<div class="ip-info" id="ipInfo">ЁЯУН <span id="userIP">Detecting IP...</span> | ЁЯМО <span id="ipLocation">US</span> - <span id="ipStatus">тЬЕ Allowed</span></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
// Firebase Config
var firebaseConfig = {
  apiKey: "AIzaSyAoo2-X5ILICXR2mFAyUhqJYpvScChlsOc",
  authDomain: "earnnovabeta.firebaseapp.com",
  projectId: "earnnovabeta",
  storageBucket: "earnnovabeta.firebasestorage.app",
  messagingSenderId: "379345093425",
  appId: "1:379345093425:web:3b69314491b8db26b71aa3"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var auth = firebase.auth();

// Auth state
var currentUser = null;
var currentUserData = null;
auth.onAuthStateChanged(function(user) {
  currentUser = user;
  if (user) {
    loadUserData(user.uid);
  } else {
    window.location.href = '../login.html';
  }
});

function loadUserData(uid) {
  db.collection('users').doc(uid).onSnapshot(function(doc) {
    if (doc.exists) {
      currentUserData = doc.data();
      updateUI();
    }
  });
}

function updateUI() {
  var bal = parseFloat(localStorage.getItem('en_bal') || '0');
  if (currentUserData && currentUserData.balance !== undefined) {
    bal = currentUserData.balance;
  }
  document.getElementById('balanceDisplay').textContent = '$' + bal.toFixed(2);
  document.getElementById('gamesPlayed').textContent = currentUserData?.gamesPlayed || 0;
}

// IP Detection
var userIPAddress = '';
var userIPCountry = 'US';
function detectIP() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.ipify.org?format=json', true);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      userIPAddress = d.ip;
      document.getElementById('userIP').textContent = d.ip;
      // Get location info
      getIPLocation(d.ip);
    } catch(e) {}
  };
  xhr.onerror = function() {
    // Fallback
    document.getElementById('userIP').textContent = 'Unknown';
    document.getElementById('ipStatus').textContent = 'тЬЕ Allowed';
  };
  xhr.send();
}

function getIPLocation(ip) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://ipapi.co/' + ip + '/json/', true);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      userIPCountry = d.country_name || 'US';
      document.getElementById('ipLocation').textContent = d.country_code || 'US';
      document.getElementById('ipBadge').textContent = 'ЁЯУН ' + (d.country_code || 'US');
      // Check if IP is allowed (all countries accepted)
      var allowed = true;
      document.getElementById('ipStatus').textContent = allowed ? 'тЬЕ Earning Allowed' : 'тЭМ Blocked';
      if (!allowed) {
        document.getElementById('ipStatus').style.color = '#EF4444';
        document.getElementById('ipInfo').style.borderColor = 'rgba(239,68,68,0.2)';
      }
    } catch(e) {}
  };
  xhr.onerror = function() {
    document.getElementById('ipLocation').textContent = 'Unknown';
    document.getElementById('ipStatus').textContent = 'тЬЕ Allowed';
  };
  xhr.send();
}
detectIP();

// ===== GAME SPECIFIC =====
var gameScore = 0;
var gameRunning = false;
var gameReward = 0.02;
var totalEarned = 0;

function startGame() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('restartBtn').style.display = 'none';
  gameRunning = true;
  gameScore = 0;
  document.getElementById('scoreDisplay').textContent = '0';
  
var memCards = [];
var memFlipped = [];
var memMatched = 0;
var memScore = 0;
var memLocked = false;
var memEmojis = ['ЁЯР╢','ЁЯР▒','ЁЯР╝','ЁЯжК','ЁЯР╕','ЁЯР╡','ЁЯжБ','ЁЯР░','ЁЯР╗','ЁЯжД','ЁЯР╖','ЁЯРо'];
var memPairs = 6;

var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 320; canvas.height = 480;

function initMemory() {
  memCards = [];
  memFlipped = [];
  memMatched = 0;
  memScore = 0;
  memLocked = false;
  
  // Pick 6 emojis
  var used = [];
  for (var i = 0; i < memPairs; i++) {
    var idx;
    do { idx = Math.floor(Math.random() * memEmojis.length); } while (used.includes(idx));
    used.push(idx);
    memCards.push({emoji: memEmojis[idx], matched: false, flipped: false, id: i*2});
    memCards.push({emoji: memEmojis[idx], matched: false, flipped: false, id: i*2+1});
  }
  // Shuffle
  for (var i = memCards.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = memCards[i]; memCards[i] = memCards[j]; memCards[j] = temp;
  }
}

function drawMemory() {
  ctx.fillStyle = '#0A0E1A';
  ctx.fillRect(0, 0, 320, 480);
  
  ctx.fillStyle = '#d4af37';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('ЁЯза Memory Match', 160, 30);
  
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '13px sans-serif';
  ctx.fillText('Matched: ' + memMatched + '/' + memPairs + ' | Moves: ' + memScore, 160, 52);
  
  var cols = 3, rows = 4;
  var cw = 80, ch = 80;
  var gap = 10;
  var startX = (320 - (cols * cw + (cols-1) * gap)) / 2;
  var startY = 80;
  
  for (var i = 0; i < memCards.length; i++) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var x = startX + col * (cw + gap);
    var y = startY + row * (ch + gap);
    
    if (memCards[i].matched) {
      ctx.fillStyle = 'rgba(16,185,129,0.1)';
      ctx.fillRect(x, y, cw, ch);
      ctx.fillStyle = '#10B981';
      ctx.font = '32px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(memCards[i].emoji, x + cw/2, y + ch/2);
    } else if (memCards[i].flipped) {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(x, y, cw, ch);
      ctx.strokeStyle = 'rgba(212,175,55,0.2)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, cw, ch);
      ctx.fillStyle = '#fff';
      ctx.font = '32px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(memCards[i].emoji, x + cw/2, y + ch/2);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fillRect(x, y, cw, ch);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, cw, ch);
      // Card back
      ctx.fillStyle = 'rgba(212,175,55,0.05)';
      ctx.font = '24px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', x + cw/2, y + ch/2);
    }
    ctx.textBaseline = 'alphabetic';
  }
  
  if (memMatched >= memPairs) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, 320, 480);
    ctx.fillStyle = '#10B981';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('All Matched! ЁЯОЙ', 160, 200);
    ctx.fillStyle = '#d4af37';
    ctx.font = '18px sans-serif';
    ctx.fillText('Moves: ' + memScore, 160, 240);
  }
}

canvas.onclick = function(e) {
  if (!gameRunning || memLocked || memMatched >= memPairs) return;
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width / rect.width;
  var scaleY = canvas.height / rect.height;
  var mx = (e.clientX - rect.left) * scaleX;
  var my = (e.clientY - rect.top) * scaleY;
  
  var cols = 3, cw = 80, ch = 80, gap = 10;
  var startX = (320 - (cols * cw + (cols-1) * gap)) / 2;
  var startY = 80;
  
  for (var i = 0; i < memCards.length; i++) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var x = startX + col * (cw + gap);
    var y = startY + row * (ch + gap);
    
    if (mx >= x && mx <= x + cw && my >= y && my <= y + ch) {
      if (memCards[i].matched || memCards[i].flipped) return;
      
      memCards[i].flipped = true;
      memFlipped.push(i);
      memScore++;
      
      if (memFlipped.length === 2) {
        memLocked = true;
        var a = memFlipped[0], b = memFlipped[1];
        if (memCards[a].emoji === memCards[b].emoji && a !== b) {
          memCards[a].matched = true;
          memCards[b].matched = true;
          memMatched++;
          memFlipped = [];
          memLocked = false;
          
          if (memMatched >= memPairs) {
            gameRunning = false;
            gameScore = Math.max(0, 12 - memScore);
            rewardGame(gameScore);
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').textContent = 'тЦ╢ Play Again';
            document.getElementById('restartBtn').style.display = 'inline-block';
          }
        } else {
          setTimeout(function() {
            memCards[a].flipped = false;
            memCards[b].flipped = false;
            memFlipped = [];
            memLocked = false;
          }, 800);
        }
      }
      drawMemory();
      return;
    }
  }
};

initMemory();
drawMemory();

}

function rewardGame(score) {
  // ЁЯОЙ Celebration animation
  triggerCelebration(score);
}

function triggerCelebration(score) {
  if (score < 1) return;
  var emojis = ['ЁЯОЙ','ЁЯОК','тЬи','тнР','ЁЯТ░','ЁЯМЯ','ЁЯТл','ЁЯПЖ'];
  for (var i = 0; i < 30; i++) {
    (function(idx) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.style.cssText = 'position:fixed;font-size:' + (12+Math.random()*16) + 'px;pointer-events:none;z-index:99999;left:' + (10+Math.random()*80) + '%;top:' + (40+Math.random()*20) + '%;opacity:1;transform:scale(1);transition:all 0.8s ease-out';
        el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        document.body.appendChild(el);
        requestAnimationFrame(function() {
          el.style.transform = 'translateY(-' + (80+Math.random()*120) + 'px) scale(0.2)';
          el.style.opacity = '0';
        });
        setTimeout(function() { if (el.parentNode) el.remove(); }, 900);
      }, idx * 60);
    })(i);
  }
  
  // Flash effect on page
  var flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle,rgba(212,175,55,0.1),transparent 70%);pointer-events:none;z-index:99998;opacity:1;transition:opacity 0.8s ease-out';
  document.body.appendChild(flash);
  requestAnimationFrame(function() { flash.style.opacity = '0'; });
  setTimeout(function() { if (flash.parentNode) flash.remove(); }, 900);
  
  console.log('ЁЯОЙ Celebration! Score: ' + score);
}

function 

  if (score < 1) {
    document.getElementById('gameStatus').innerHTML = 'Score: <span id="scoreDisplay">0</span> | тЭМ No reward (score too low)';
    return;
  }
  var bonus = Math.min(score * 0.005, 0.050);
  var total = 0.02 + bonus;
  totalEarned += total;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('rewardDisplay').textContent = '$' + total.toFixed(3);
  
  // Credit balance
  var bal = parseFloat(localStorage.getItem('en_bal') || '0');
  bal += total;
  localStorage.setItem('en_bal', String(bal));
  
  // Update Firestore
  if (currentUser) {
    db.collection('users').doc(currentUser.uid).update({
      balance: firebase.firestore.FieldValue.increment(total),
      gamesPlayed: firebase.firestore.FieldValue.increment(1),
      totalGamesEarned: firebase.firestore.FieldValue.increment(total)
    }).catch(function(e) { console.warn(e); });
  }
  
  document.getElementById('gamesPlayed').textContent = parseInt(document.getElementById('gamesPlayed').textContent || '0') + 1;
  document.getElementById('gameStatus').innerHTML = 'Score: <span id="scoreDisplay">' + score + '</span> | ЁЯОЙ Earned: <span class="earned">$' + total.toFixed(3) + '</span> | Bonus: $' + bonus.toFixed(3);
  document.getElementById('balanceDisplay').textContent = '$' + bal.toFixed(2);
}

function restartGame() {
  gameRunning = false;
  document.getElementById('startBtn').style.display = 'inline-block';
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('gameStatus').innerHTML = 'Score: <span id="scoreDisplay">0</span> | Reward: <span class="earned" id="rewardDisplay">$0.000</span>';
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', restartGame);
</script>
</body>
</html>
