<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Word Scramble | EARNNOVA</title>
<style>
:root{
  --bg:#0F172A;--bg2:#0A0E1A;--card:rgba(255,255,255,0.03);--gold:#d4af37;--emerald:#10B981;--amber:#F59E0B;
  --text:#F0F0F4;--text-muted:rgba(240,240,244,0.4);--radius:12px;--font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.header{
  display:flex;align-items:center;padding:10px 14px;gap:10px;
  background:rgba(15,23,42,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.04);position:sticky;top:0;z-index:100;
}
.header .back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:0.2s;flex-shrink:0;text-decoration:none;color:var(--text)}
.header .back:hover{background:rgba(255,255,255,0.08)}
.header .title{flex:1;font-size:15px;font-weight:700;color:var(--gold)}
.header .balance{padding:6px 12px;border-radius:8px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.15);font-size:12px;font-weight:700;color:var(--emerald);white-space:nowrap}
.header .ip-badge{padding:4px 10px;border-radius:6px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.1);font-size:10px;font-weight:600;color:var(--gold);white-space:nowrap}
.game-container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;position:relative}
.game-container canvas{border-radius:var(--radius);background:var(--bg2);max-width:100%;height:auto !important}
.game-controls{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.game-controls button{
  padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:0.2s;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:var(--text);
}
.game-controls button.primary{background:rgba(212,175,55,0.1);border-color:rgba(212,175,55,0.15);color:var(--gold)}
.game-controls button.primary:hover{background:rgba(212,175,55,0.15)}
.game-controls button.danger{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.12);color:#EF4444}
.status{padding:8px 14px;margin-top:8px;border-radius:8px;background:var(--card);border:1px solid rgba(255,255,255,0.04);font-size:11px;color:var(--text-muted);text-align:center}
.status .earned{color:var(--emerald);font-weight:700}
.ip-info{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  padding:6px 14px;border-radius:100px;
  background:rgba(15,23,42,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.04);
  font-size:10px;color:var(--text-muted);white-space:nowrap;z-index:50;
}
.ip-info strong{color:var(--gold)}
@media(max-width:400px){.header .ip-badge{display:none}
</style>

<script>

<body>
<div class="header">
  <a href="../earn.html" class="back">‹</a>
  <span class="title">🔤 Word Scramble</span>
  <span class="ip-badge" id="ipBadge">📍 IP...</span>
  <span class="balance" id="balanceDisplay">$0.00</span>
</div>
<div class="game-container" id="gameContainer">
  <canvas id="gameCanvas" width="320" height="480" style="width:320px;height:480px"></canvas>
  <div class="game-controls" id="gameControls">
    <button class="primary" id="startBtn">▶ Start Game</button>
    <button id="restartBtn" style="display:none">🔄 Play Again</button>
  </div>
  <div class="status" id="gameStatus">Score: <span id="scoreDisplay">0</span> | Reward: <span class="earned" id="rewardDisplay">$0.000</span> | <span id="gamesPlayed">0</span> played</div>
</div>
<div class="ip-info" id="ipInfo">📍 <span id="userIP">Detecting IP...</span> | 🌎 <span id="ipLocation">US</span> - <span id="ipStatus">✅ Allowed</span></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
// Firebase Config
var firebaseConfig = {
  apiKey: "AIzaSyAoo2-X5ILICXR2mFAyUhqJYpvScChlsOc",
  authDomain: "earnnovabeta.firebaseapp.com",
  projectId: "earnnovabeta",
  storageBucket: "earnnovabeta.firebasestorage.app",
  messagingSenderId: "379345093425",
  appId: "1:379345093425:web:3b69314491b8db26b71aa3"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var auth = firebase.auth();

// Auth state
var currentUser = null;
var currentUserData = null;
auth.onAuthStateChanged(function(user) {
  currentUser = user;
  if (user) {
    loadUserData(user.uid);
  } else {
    window.location.href = '../login.html';
  }
});

function loadUserData(uid) {
  db.collection('users').doc(uid).onSnapshot(function(doc) {
    if (doc.exists) {
      currentUserData = doc.data();
      updateUI();
    }
  });
}

function updateUI() {
  var bal = parseFloat(localStorage.getItem('en_bal') || '0');
  if (currentUserData && currentUserData.balance !== undefined) {
    bal = currentUserData.balance;
  }
  document.getElementById('balanceDisplay').textContent = '$' + bal.toFixed(2);
  document.getElementById('gamesPlayed').textContent = currentUserData?.gamesPlayed || 0;
}

// IP Detection
var userIPAddress = '';
var userIPCountry = 'US';
function detectIP() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.ipify.org?format=json', true);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      userIPAddress = d.ip;
      document.getElementById('userIP').textContent = d.ip;
      // Get location info
      getIPLocation(d.ip);
    } catch(e) {}
  };
  xhr.onerror = function() {
    // Fallback
    document.getElementById('userIP').textContent = 'Unknown';
    document.getElementById('ipStatus').textContent = '✅ Allowed';
  };
  xhr.send();
}

function getIPLocation(ip) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://ipapi.co/' + ip + '/json/', true);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      userIPCountry = d.country_name || 'US';
      document.getElementById('ipLocation').textContent = d.country_code || 'US';
      document.getElementById('ipBadge').textContent = '📍 ' + (d.country_code || 'US');
      // Check if IP is allowed (all countries accepted)
      var allowed = true;
      document.getElementById('ipStatus').textContent = allowed ? '✅ Earning Allowed' : '❌ Blocked';
      if (!allowed) {
        document.getElementById('ipStatus').style.color = '#EF4444';
        document.getElementById('ipInfo').style.borderColor = 'rgba(239,68,68,0.2)';
      }
    } catch(e) {}
  };
  xhr.onerror = function() {
    document.getElementById('ipLocation').textContent = 'Unknown';
    document.getElementById('ipStatus').textContent = '✅ Allowed';
  };
  xhr.send();
}
detectIP();

// ===== GAME SPECIFIC =====
var gameScore = 0;
var gameRunning = false;
var gameReward = 0.02;
var totalEarned = 0;

// Game loaded from games.js
function startGame() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('restartBtn').style.display = 'none';
  gameRunning = true;
  gameScore = 0;
  document.getElementById('scoreDisplay').textContent = '0';
  
var word = {
  birdX: 60, birdY: 200, birdVY: 0, gravity: 0.5, jump: -8,
  pipes: [], pipeWidth: 40, pipeGap: 140, frameId: null, 
  started: false, pipeCount: 0
};


// ===== GAME VARIABLES =====
var canvas = null;
var gameRunning = false;
var gameOver = false;
var gameScore = 0;
var gameReward = 0.020;
var totalEarned = 0;

// Word Scramble vars
var wordList = [
  { word: 'NEXUS', hint: '🔗 Platform name' },
  { word: 'EARN', hint: '💰 What you do here' },
  { word: 'MONEY', hint: '💵 Digital currency' },
  { word: 'GAMES', hint: '🎮 Fun activities' },
  { word: 'SCORE', hint: '📊 Your points' },
  { word: 'REWARD', hint: '🎁 What you get' },
  { word: 'TOKEN', hint: '🔑 Digital asset' },
  { word: 'BONUS', hint: '🎯 Extra reward' },
  { word: 'LEVEL', hint: '📈 Game stage' },
  { word: 'POWER', hint: '⚡ Energy' },
  { word: 'NOVA', hint: '⭐ Star explosion' },
  { word: 'GOLD', hint: '🥇 Precious metal' },
  { word: 'GEMS', hint: '💎 Precious stones' },
  { word: 'STAR', hint: '⭐ Celestial body' },
  { word: 'VIP', hint: '👑 Special member' },
  { word: 'DARK', hint: '🌑 Opposite of light' },
  { word: 'LIGHT', hint: '☀️ Makes things visible' },
  { word: 'SPEED', hint: '🏃 Fastness' },
  { word: 'BRAIN', hint: '🧠 Thinking organ' },
  { word: 'SMART', hint: '🧠 Intelligent' }
];

var currentWordIdx = 0;
var totalWords = 5;
var wordQueue = [];
var correctAnswers = 0;
var currentQuestion = null;
var scrambledWord = '';

function shuffleStr(str) {
  var arr = str.split('');
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr.join('');
}

function pickWords() {
  wordQueue = [];
  var pool = wordList.slice();
  for (var i = 0; i < totalWords && pool.length > 0; i++) {
    var idx = Math.floor(Math.random() * pool.length);
    wordQueue.push(pool[idx]);
    pool.splice(idx, 1);
  }
  currentWordIdx = 0;
  correctAnswers = 0;
}

function showWordQuestion() {
  var container = document.getElementById('wordGameContainer');
  if (!container) return;
  
  if (currentWordIdx >= wordQueue.length) {
    // Game complete!
    gameOver = true;
    gameRunning = false;
    gameScore = correctAnswers;
    rewardGame(correctAnswers);
    return;
  }
  
  currentQuestion = wordQueue[currentWordIdx];
  scrambledWord = shuffleStr(currentQuestion.word);
  
  var html = '';
  html += '<div style="text-align:center;padding:16px 8px">';
  html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">Word ' + (currentWordIdx + 1) + '/' + totalWords + '</div>';
  html += '<div style="font-size:36px;font-weight:800;letter-spacing:10px;font-family:monospace;padding:20px 12px;background:rgba(212,175,55,0.04);border-radius:12px;border:1px solid rgba(212,175,55,0.08);margin:8px 0;text-transform:uppercase;color:var(--gold);word-break:break-all" id="scrambledWord">' + scrambledWord + '</div>';
  html += '<div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">' + currentQuestion.hint + '</div>';
  html += '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">';
  html += '<input type="text" id="wordAnswer" placeholder="Type the word..." style="padding:10px 14px;border-radius:8px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.06);color:#fff;font-size:16px;text-transform:uppercase;width:160px;outline:none;text-align:center;font-weight:600;font-family:monospace" maxlength="10" autocomplete="off">';
  html += '<button onclick="checkWordAnswer()" style="padding:10px 20px;border-radius:8px;background:linear-gradient(135deg,var(--emerald),#059669);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer">✅ Check</button>';
  html += '</div>';
  html += '<div id="wordFeedback" style="margin-top:12px;font-size:14px;font-weight:600;min-height:24px"></div>';
  html += '<div style="margin-top:8px;display:flex;gap:8px;justify-content:center">';
  html += '<span style="font-size:11px;color:var(--text-muted)">Score: <strong id="wordScoreDisplay" style="color:var(--gold)">' + correctAnswers + '</strong>/' + totalWords + '</span>';
  html += '</div>';
  html += '</div>';
  
  container.innerHTML = html;
  
  // Focus input
  setTimeout(function() {
    var input = document.getElementById('wordAnswer');
    if (input) input.focus();
  }, 100);
}

window.checkWordAnswer = function() {
  var input = document.getElementById('wordAnswer');
  var feedback = document.getElementById('wordFeedback');
  if (!input || !feedback || !currentQuestion) return;
  
  var answer = input.value.trim().toUpperCase();
  if (answer === currentQuestion.word.toUpperCase()) {
    correctAnswers++;
    feedback.innerHTML = '✅ <span style="color:#10B981">Correct! +1</span>';
    feedback.style.color = '#10B981';
    document.getElementById('wordScoreDisplay').textContent = correctAnswers;
    // Celebrate!
    triggerMiniConfetti();
  } else {
    feedback.innerHTML = '❌ <span style="color:#EF4444">Wrong! Answer: <strong>' + currentQuestion.word + '</strong></span>';
    feedback.style.color = '#EF4444';
  }
  
  currentWordIdx++;
  
  // Next word after delay
  setTimeout(function() {
    showWordQuestion();
  }, 1200);
};

function triggerMiniConfetti() {
  // Simple confetti burst
  var container = document.getElementById('wordGameContainer');
  if (!container) return;
  var colors = ['#d4af37','#10B981','#F59E0B','#3B82F6','#EC4899','#A855F7'];
  for (var i = 0; i < 20; i++) {
    var el = document.createElement('div');
    el.style.cssText = 'position:fixed;width:6px;height:6px;border-radius:50%;background:' + colors[Math.floor(Math.random()*colors.length)] + ';pointer-events:none;z-index:9999;left:' + (50 + Math.random()*30) + '%;top:' + (30 + Math.random()*20) + '%;opacity:1';
    document.body.appendChild(el);
    el.animate([
      { transform: 'translateY(0px) scale(1)', opacity: 1 },
      { transform: 'translateY(-' + (50+Math.random()*80) + 'px) scale(0.3)', opacity: 0 }
    ], { duration: 600 + Math.random()*400, easing: 'ease-out' }).onfinish = function() { el.remove(); };
  }
}

function startGame() {
  if (gameRunning) return;
  gameRunning = true;
  gameOver = false;
  gameScore = 0;
  correctAnswers = 0;
  totalEarned = 0;
  pickWords();
  document.getElementById('gamePlayStatus').textContent = '🎮 Playing...';
  document.getElementById('gamePlayStatus').style.color = '#10B981';
  showWordQuestion();
}

function restartGame() {
  gameRunning = false;
  gameOver = false;
  gameScore = 0;
  correctAnswers = 0;
  totalEarned = 0;
  currentWordIdx = 0;
  wordQueue = [];
  document.getElementById('rewardDisplay').textContent = '$0.000';
  document.getElementById('scoreDisplay').textContent = '0';
  document.getElementById('gamePlayStatus').textContent = '🔄 Press Start';
  document.getElementById('gamePlayStatus').style.color = '';
  var container = document.getElementById('wordGameContainer');
  if (container) {
    container.innerHTML = '<div style="text-align:center;padding:40px 16px;color:var(--text-muted);font-size:14px">🔤 Press <strong style="color:var(--gold)">Start</strong> to play Word Scramble!</div>';
  }
}

function rewardGame(score) {
  if (score < 1) {
    document.getElementById('gamePlayStatus').textContent = '❌ No reward (score too low)';
    document.getElementById('gamePlayStatus').style.color = '#EF4444';
    return;
  }
  
  var total = gameReward;
  var bonus = Math.min(score * 0.005, 0.050);
  total += bonus;
  totalEarned += total;
  
  // Update display
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('rewardDisplay').textContent = '$' + total.toFixed(3);
  document.getElementById('gamePlayStatus').textContent = '🎉 +$' + total.toFixed(3) + ' earned!';
  document.getElementById('gamePlayStatus').style.color = '#10B981';
  
  // Credit balance
  var bal = parseFloat(localStorage.getItem('en_bal') || '0');
  if (typeof currentUserData !== 'undefined' && currentUserData && currentUserData.balance !== undefined) {
    bal = currentUserData.balance;
  }
  bal += total;
  localStorage.setItem('en_bal', String(bal));
  document.getElementById('balanceDisplay').textContent = '$' + bal.toFixed(2);
  
  // Update Firestore
  try {
    if (typeof db !== 'undefined' && typeof currentUser !== 'undefined' && currentUser) {
      db.collection('users').doc(currentUser.uid).update({
        balance: firebase.firestore.FieldValue.increment(total),
        totalGamesEarned: firebase.firestore.FieldValue.increment(total)
      }).catch(function(e){});
    }
  } catch(e) {}
  
  // Save earned
  var earned = parseFloat(localStorage.getItem('en_earned') || '0');
  earned += total;
  localStorage.setItem('en_earned', String(earned));
  localStorage.setItem('en_today', String((parseFloat(localStorage.getItem('en_today')||'0') + total)));
  
  // 🎉 Celebration!
  triggerCelebration(score, total);
}

function triggerCelebration(score, reward) {
  if (score < 1) return;
  
  // Confetti emojis
  var emojis = ['🎉','🎊','✨','⭐','💰','🌟','💫','🏆','💎','🔥'];
  for (var i = 0; i < 35; i++) {
    setTimeout(function() {
      var el = document.createElement('div');
      el.style.cssText = 'position:fixed;font-size:' + (10+Math.random()*18) + 'px;pointer-events:none;z-index:99999;left:' + (5+Math.random()*90) + '%;top:' + (50+Math.random()*30) + '%;opacity:1;transform:scale(1);transition:all 1s cubic-bezier(0.25,0.46,0.45,0.94)';
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      document.body.appendChild(el);
      requestAnimationFrame(function() {
        el.style.transform = 'translateY(-' + (100+Math.random()*150) + 'px) translateX(' + (Math.random()*40-20) + 'px) scale(0.2) rotate(' + Math.random()*360 + 'deg)';
        el.style.opacity = '0';
      });
      setTimeout(function() { if (el.parentNode) el.remove(); }, 1100);
    }, i * 50);
  }
  
  // Gold flash effect
  var flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 50%, rgba(212,175,55,0.15), transparent 70%);pointer-events:none;z-index:99998;opacity:1;transition:opacity 0.8s ease-out';
  document.body.appendChild(flash);
  requestAnimationFrame(function() { flash.style.opacity = '0'; });
  setTimeout(function() { if (flash.parentNode) flash.remove(); }, 1000);
  
  // Toast notification
  showToast('🎉', '+' + (reward || 0).toFixed(3), 'money');
  
  console.log('🎉 Game reward! Score: ' + score + ' | +$' + (reward || 0).toFixed(3));
}

// ===== RESTART GAME =====function restartGame() {
  gameRunning = false;
  document.getElementById('startBtn').style.display = 'inline-block';
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('gameStatus').innerHTML = 'Score: <span id="scoreDisplay">0</span> | Reward: <span class="earned" id="rewardDisplay">$0.000</span>';
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', restartGame);
</script>
</body>
</html>
