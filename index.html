<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EARNNOVA</title>
<style>
body{margin:0;background:#0F172A;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:-apple-system,sans-serif}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.06);border-top-color:#10B981;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
p{font-size:14px;color:#64748B;margin:0}
</style>
</head>
<body>
<div class="spinner"></div>
<p>Loading EARNNOVA...</p>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="js/supabase-config.js"></script>
<script>
var _r=false;
function rd(u){if(!_r){_r=true;window.location.href=u;}}
// Auth listener is SINGLE source of truth for redirects
auth.onAuthStateChanged(function(user){rd(user?'home.html':'login.html');});
// Fallback if Firebase never loads
setTimeout(function(){rd('login.html');},5000);
</script>
</body>
</html>
