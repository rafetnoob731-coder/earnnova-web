<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EARNNOVA — Sign In</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
body{margin:0;background:#080A12;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;box-sizing:border-box}
.auth-wrap{width:100%;max-width:400px}
.auth-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(24px) saturate(140%);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:32px 24px;box-shadow:0 16px 80px rgba(0,0,0,0.3)}
.auth-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 16px;box-shadow:0 8px 32px rgba(16,185,129,0.2)}
.auth-title{font-size:22px;font-weight:800;text-align:center}
.auth-subtitle{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;margin:4px 0 24px}
.auth-input-group{margin-bottom:14px}
.auth-input-group label{font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:1px}
.auth-input-wrap{display:flex;align-items:center;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);transition:all 0.2s}
.auth-input-wrap:focus-within{border-color:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,0.1)}
.auth-input-wrap i{color:rgba(255,255,255,0.2);width:18px;font-size:14px}
.auth-input-wrap input{background:none;border:none;outline:none;color:#fff;font-size:14px;width:100%;margin-left:10px}
.auth-input-wrap input::placeholder{color:rgba(255,255,255,0.15)}
.auth-row{display:flex;justify-content:space-between;align-items:center;margin:16px 0}
.auth-check{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer}
.auth-check input{accent-color:#10B981}
.auth-link{font-size:12px;color:#10B981;cursor:pointer;text-decoration:none;transition:opacity 0.2s}
.auth-link:hover{opacity:0.7}
.btn-auth{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.25s}
.btn-auth:active{transform:scale(0.98)}
.btn-auth:disabled{opacity:0.5;cursor:not-allowed}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:rgba(255,255,255,0.15);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}
.btn-google{width:100%;padding:13px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-google:active{transform:scale(0.98)}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.3)}
.auth-footer a{color:#10B981;text-decoration:none;font-weight:600}
.auth-alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.auth-alert.error{display:block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#FCA5A5}
.auth-alert.success{display:block;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#6EE7B7}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9307459733796967" crossorigin="anonymous"></script>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">E</div>
    <div class="auth-title">Welcome Back</div>
    <div class="auth-subtitle">Sign in to continue earning</div>

    <div class="auth-alert" id="alertBox"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm">
      <div class="auth-input-group">
        <label>Email</label>
        <div class="auth-input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="your@email.com" required autocomplete="email">
        </div>
      </div>
      <div class="auth-input-group">
        <label>Password</label>
        <div class="auth-input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
        </div>
      </div>

      <div class="auth-row">
        <label class="auth-check"><input type="checkbox" id="remember" checked> Remember me</label>
        <a href="#" id="forgotLink" class="auth-link">Forgot password?</a>
      </div>

      <button type="submit" id="loginBtn" class="btn-auth">Sign In</button>
    </form>

    <!-- FORGOT PASSWORD -->
    <form id="forgotForm" style="display:none">
      <div class="auth-input-group">
        <label>Email</label>
        <div class="auth-input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="forgotEmail" placeholder="your@email.com" required>
        </div>
      </div>
      <button type="submit" id="forgotBtn" class="btn-auth">Send Reset Link</button>
      <div style="text-align:center;margin-top:12px">
        <a href="#" id="backToLogin" class="auth-link">← Back to Sign In</a>
      </div>
    </form>

    <div class="auth-divider">or continue with</div>
    <button class="btn-google" onclick="googleSignIn()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="register.html" id="registerLink">Sign Up</a>
    </div>
  </div>
  <div style="text-align:center;margin-top:16px;font-size:11px;color:rgba(255,255,255,0.15)">
    <a href="privacy.html" style="color:rgba(255,255,255,0.15);text-decoration:none">Privacy</a> • 
    <a href="terms.html" style="color:rgba(255,255,255,0.15);text-decoration:none">Terms</a>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script>
// ===== DOM REFS =====
var alertBox = document.getElementById('alertBox');
var loginForm = document.getElementById('loginForm');
var forgotForm = document.getElementById('forgotForm');

function showAlert(msg, type) {
  alertBox.textContent = msg;
  alertBox.className = 'auth-alert ' + (type || 'error');
}

function getAuthError(err) {
  var m = {
    'auth/user-not-found': 'No account with this email',
    'auth/wrong-password': 'Invalid password',
    'auth/email-already-in-use': 'This email is already registered',
    'auth/weak-password': 'Password must be 6+ characters',
    'auth/invalid-email': 'Please enter a valid email',
    'auth/too-many-requests': 'Too many attempts. Try again later',
    'auth/network-request-failed': 'Network error. Check your connection',
    'auth/popup-closed-by-user': 'Sign-in cancelled',
    'auth/unauthorized-domain': 'This domain is not authorized. Contact support.',
    'auth/user-disabled': 'This account has been disabled',
    'auth/operation-not-allowed': 'Google sign-in is not enabled'
  };
  return m[err.code] || err.message || 'An error occurred';
}

// ===== LOGIN =====
loginForm.addEventListener('submit', async function(e) {
  e.preventDefault();
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  var btn = document.getElementById('loginBtn');
  
  btn.disabled = true;
  btn.textContent = '⏳ Signing in...';
  
  try {
    await auth.signInWithEmailAndPassword(email, password);
    // onAuthStateChanged handles redirect
  } catch(err) {
    showAlert(getAuthError(err), 'error');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

// ===== FORGOT PASSWORD =====
document.getElementById('forgotLink').addEventListener('click', function(e) {
  e.preventDefault();
  loginForm.style.display = 'none';
  forgotForm.style.display = 'block';
});

document.getElementById('backToLogin').addEventListener('click', function(e) {
  e.preventDefault();
  forgotForm.style.display = 'none';
  loginForm.style.display = 'block';
});

forgotForm.addEventListener('submit', async function(e) {
  e.preventDefault();
  var email = document.getElementById('forgotEmail').value.trim();
  var btn = document.getElementById('forgotBtn');
  
  btn.disabled = true;
  btn.textContent = '⏳ Sending...';
  
  try {
    await auth.sendPasswordResetEmail(email);
    showAlert('✅ Reset link sent! Check your email.', 'success');
    btn.textContent = '✅ Sent';
  } catch(err) {
    showAlert(getAuthError(err), 'error');
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
});

// ===== GOOGLE SIGN IN =====
function googleSignIn() {
  if (!firebase || !firebase.auth) {
    showAlert('Google sign-in is not available', 'error');
    return;
  }
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

// ===== AUTH STATE =====
// Auth state redirect — supports auth=redirect & token params
(function() {
  var params = new URLSearchParams(window.location.search);
  var authMode = params.get('auth');
  var redirUrl = params.get('redirect') || 'home.html';
  var token = params.get('token');

  if (token) {
    console.log('🔑 Login token:', token);
    localStorage.setItem('en_login_token', token);
  }

  if (authMode === 'redirect') {
    console.log('🔄 Auth redirect mode →', redirUrl);
  }

  auth.onAuthStateChanged(function(user) {
    if (user) {
      window.location.href = authMode === 'redirect' ? redirUrl : 'home.html';
    }
  });
})();
</script>

<script>
// Preserve URL params to register
(function() {
  var regLink = document.getElementById('registerLink');
  if (regLink) {
    var p = new URLSearchParams(window.location.search);
    var parts = [];
    if (p.get('auth')) parts.push('auth=' + p.get('auth'));
    if (p.get('redirect')) parts.push('redirect=' + encodeURIComponent(p.get('redirect')));
    if (p.get('token')) parts.push('token=' + p.get('token'));
    if (p.get('ref')) parts.push('ref=' + p.get('ref'));
    if (parts.length > 0) regLink.href = 'register.html?' + parts.join('&');
  }
})();
</script></body>
</html>
