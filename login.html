<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EARNNOVA — Premium</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
/* ===== PREMIUM AUTH PAGE ===== */
body { margin:0; background:#080A12; overflow:hidden; display:flex; align-items:center; justify-content:center; min-height:100vh; }

/* Floating particles background */
#particles-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.particle {
  position:absolute; width:3px; height:3px; background:rgba(212,175,55,0.5);
  border-radius:50%; animation:floatParticle linear infinite;
  box-shadow:0 0 6px rgba(212,175,55,0.3);
}
@keyframes floatParticle { 0%{transform:translateY(100vh) scale(0);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateY(-10vh) scale(1);opacity:0} }

/* Ambient glow */
.ambient-glow {
  position:fixed; width:400px; height:400px; border-radius:50%;
  filter:blur(100px); pointer-events:none; z-index:0; opacity:0.3;
}
.ambient-glow.g1 { top:-120px; left:-80px; background:rgba(212,175,55,0.2); }
.ambient-glow.g2 { bottom:-120px; right:-80px; background:rgba(16,185,129,0.15); }

/* Login page container */
#loginPage {
  position:relative; z-index:10; width:100%; max-width:420px;
  padding:20px; box-sizing:border-box;
  perspective:1000px;
}

/* Loading state */
#loginSplash { display:none; text-align:center; padding:60px 20px; }
#loginSplash .spinner { width:48px;height:48px;border:3px solid rgba(255,255,255,0.05);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px;box-shadow:0 0 30px rgba(212,175,55,0.1); }
@keyframes spin { to{transform:rotate(360deg)} }
#loginSplash p { color:var(--slate-400); font-size:14px; }

/* Video fallback background */
.auth-fallback-bg { position:fixed; inset:0; z-index:0; background:linear-gradient(135deg,#080A12,#0F172A,#1a1f33); }

/* 3D tilt on glass container */
.auth-glass-container {
  transform-style:preserve-3d;
  transition:transform 0.3s cubic-bezier(0.23,1,0.32,1);
}

/* Shake animation for errors */
@keyframes shakeError { 0%,100%{transform:translateX(0)} 10%{transform:translateX(-6px)} 20%{transform:translateX(6px)} 30%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 50%{transform:translateX(-2px)} }
.shake-error { animation:shakeError 0.5s ease-in-out; }
</style>
</head>
<body>

<!-- Ambient Background Elements -->
<div class="auth-fallback-bg"></div>
<div class="ambient-glow g1"></div>
<div class="ambient-glow g2"></div>
<div id="particles-canvas"></div>

<!-- Loading -->
<div id="loginSplash">
  <div class="spinner"></div>
  <p>Checking authentication...</p>
</div>

<div id="loginPage">
  <!-- Auth Glass Container -->
  <div id="authContainer" class="auth-glass-container" style="position:relative;opacity:1;transform:none;animation:none;">
    
    <div class="auth-glass-brand">
      <div class="auth-glass-logo">✦ EARNNOVA</div>
      <div class="auth-glass-underline"></div>
      <div class="auth-glass-subtitle">Earn · Grow · Thrive</div>
    </div>

    <!-- Alert Box -->
    <div id="alertBox" class="auth-glass-alert"></div>
    
    <!-- LOGIN FORM -->
    <form id="loginForm" class="auth-glass-form">
      <div class="auth-glass-input"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email" required autocomplete="email"></div>
      <div class="auth-glass-input"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password"></div>
      <button type="submit" id="loginBtn" class="auth-glass-btn">Sign In</button>
      <div class="auth-glass-row">
        <label class="auth-glass-check"><input type="checkbox" id="rememberMe"> Remember me</label>
        <a href="#" id="forgotLink" class="auth-glass-link">Forgot?</a>
      </div>
    </form>
    
    <!-- REGISTER FORM -->
    <form id="registerForm" class="auth-glass-form hidden">
      <div class="auth-glass-input"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="Full Name" required></div>
      <div class="auth-glass-input"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Email" required></div>
      <div class="auth-glass-input"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Password (6+ chars)" required></div>
      <div class="auth-glass-input"><i class="fas fa-gift"></i><input type="text" id="regReferral" placeholder="Referral Code (optional)"></div>
      <button type="submit" id="registerBtn" class="auth-glass-btn">Create Account</button>
    </form>
    
    <!-- FORGOT PASSWORD FORM -->
    <form id="forgotForm" class="auth-glass-form hidden">
      <p class="auth-glass-desc">Enter your email and we'll send a reset link.</p>
      <div class="auth-glass-input"><i class="fas fa-envelope"></i><input type="email" id="forgotEmail" placeholder="Email" required></div>
      <button type="submit" id="forgotBtn" class="auth-glass-btn">Send Reset Link</button>
      <p class="auth-glass-back"><a href="#" id="backToLogin" class="auth-glass-link">← Back to Sign In</a></p>
    </form>
    
    <div class="auth-glass-divider"><span>or</span></div>
    <button id="googleBtn" class="auth-glass-btn auth-glass-btn-outline"><i class="fab fa-google"></i> Continue with Google</button>
    
    <div class="auth-glass-footer">
      <span id="toggleText" class="auth-glass-muted">No account?</span>
      <a href="#" id="toggleLink" class="auth-glass-link">Sign Up</a>
    </div>
    <div class="auth-glass-policy">
      <a href="privacy.html" target="_blank" class="auth-glass-link">Privacy</a>
      <span class="auth-glass-dot">•</span>
      <a href="terms.html" target="_blank" class="auth-glass-link">Terms</a>
    </div>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script>
// ===== PARTICLES =====
(function initParticles() {
  var canvas = document.getElementById('particles-canvas');
  var count = 20;
  for (var i = 0; i < count; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (12 + Math.random() * 20) + 's';
    p.style.animationDelay = Math.random() * 20 + 's';
    p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
    canvas.appendChild(p);
  }
})();

// ===== 3D TILT ON AUTH CONTAINER =====
(function init3DTilt() {
  var container = document.getElementById('authContainer');
  if (!container) return;
  
  container.addEventListener('touchmove', function(e) {
    var touch = e.touches[0];
    if (!touch) return;
    var rect = container.getBoundingClientRect();
    var cx = rect.left + rect.width/2;
    var cy = rect.top + rect.height/2;
    var dx = (touch.clientX - cx) / (rect.width/2);
    var dy = (touch.clientY - cy) / (rect.height/2);
    var rx = Math.max(-6, Math.min(6, -dy * 5));
    var ry = Math.max(-6, Math.min(6, dx * 5));
    container.style.transform = 'perspective(600px) rotateX('+rx+'deg) rotateY('+ry+'deg) scale3d(1.02,1.02,1.02)';
  }, { passive: true });
  
  container.addEventListener('touchend', function() {
    container.style.transform = 'perspective(600px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)';
    container.style.transition = 'transform 0.5s cubic-bezier(0.23,1,0.32,1)';
    setTimeout(function() { if (container) container.style.transition = ''; }, 500);
  }, { passive: true });
})();

// ===== LOGIN PAGE BOOT =====
var splash = document.getElementById('loginSplash');
var pageContainer = document.getElementById('loginPage');
var _loginRedirectTimer = null;

function goToHome() {
  if (_loginRedirectTimer) clearTimeout(_loginRedirectTimer);
  _loginRedirectTimer = setTimeout(function() { window.location.href = 'home.html'; }, 300);
}

// Show auth forms with animation
function showAuth() {
  splash.style.display = 'none';
  pageContainer.style.display = 'block';
  var container = document.getElementById('authContainer');
  container.style.opacity = '0';
  container.style.transform = 'translateY(24px) scale(0.96)';
  setTimeout(function() {
    container.style.opacity = '1';
    container.style.transform = 'translateY(0) scale(1)';
    container.style.transition = 'all 0.7s cubic-bezier(0.23,1,0.32,1)';
  }, 50);
}

// Auth state listener
auth.onAuthStateChanged(function(user) {
  if (user) {
    goToHome();
  } else {
    showAuth();
  }
});

// Handle redirect sign-in result
auth.getRedirectResult().then(function(result) {
  if (result && result.user) {
    goToHome();
  }
}).catch(function(err) {
  // Ignore — onAuthStateChanged handles it
});
</script>
</body>
</html>
