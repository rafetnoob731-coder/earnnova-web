<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EARNNOVA — Sign In</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
body{margin:0;background:#080A12;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:100vh}
.auth-page-wrap{position:relative;z-index:10;width:100%;max-width:420px;padding:20px;box-sizing:border-box;perspective:1000px}
#authContainer{transform-style:preserve-3d;transition:transform 0.3s cubic-bezier(0.23,1,0.32,1)}
.ambient-g1,.ambient-g2{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;opacity:0.3}
.ambient-g1{top:-120px;left:-80px;background:rgba(212,175,55,0.2)}
.ambient-g2{bottom:-120px;right:-80px;background:rgba(16,185,129,0.15)}
#particles-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
@keyframes floatParticle{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}
.particle{position:absolute;width:3px;height:3px;background:rgba(212,175,55,0.5);border-radius:50%;box-shadow:0 0 6px rgba(212,175,55,0.3);animation:floatParticle linear infinite}
.loading-overlay{position:fixed;inset:0;z-index:999;background:rgba(8,10,18,0.85);display:none;align-items:center;justify-content:center;flex-direction:column}
.loading-overlay.show{display:flex}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.05);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--slate-400)}
</style>
</head>
<body>
<div class="ambient-g1"></div><div class="ambient-g2"></div>
<div id="particles-canvas"></div>

<!-- Loading overlay while checking auth -->
<div class="loading-overlay" id="authLoading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Checking authentication...</div>
</div>

<div class="auth-page-wrap" id="authPageWrap" style="display:none">
  <div id="authContainer" class="auth-glass-container" style="position:relative">
    <div class="auth-glass-brand">
      <div class="auth-glass-logo">✦ EARNNOVA</div>
      <div class="auth-glass-underline"></div>
      <div class="auth-glass-subtitle">Earn · Grow · Thrive</div>
    </div>
    <div id="alertBox" class="auth-glass-alert"></div>
    
    <!-- LOGIN -->
    <form id="loginForm">
      <div class="auth-glass-input"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email" required autocomplete="email"></div>
      <div class="auth-glass-input"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password"></div>
      <div class="auth-glass-row">
        <label class="auth-glass-check"><input type="checkbox" id="remember" checked> Remember me</label>
        <a href="#" id="forgotLink" class="auth-glass-link">Forgot?</a>
      </div>
      <button type="submit" id="loginBtn" class="auth-glass-btn">Sign In</button>
    </form>
    
    <!-- REGISTER -->
    <form id="registerForm" class="hidden">
      <div class="auth-glass-input"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="Full Name" required></div>
      <div class="auth-glass-input"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Email" required></div>
      <div class="auth-glass-input"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Password (6+ chars)" required></div>
      <div class="auth-glass-input"><i class="fas fa-gift"></i><input type="text" id="regReferral" placeholder="Referral Code (optional)"></div>
      <button type="submit" id="registerBtn" class="auth-glass-btn">Create Account</button>
    </form>
    
    <!-- FORGOT -->
    <form id="forgotForm" class="hidden">
      <p class="auth-glass-desc">Enter your email for a reset link.</p>
      <div class="auth-glass-input"><i class="fas fa-envelope"></i><input type="email" id="forgotEmail" placeholder="Email" required></div>
      <button type="submit" id="forgotBtn" class="auth-glass-btn">Send Reset Link</button>
      <p class="auth-glass-back"><a href="#" id="backToLogin" class="auth-glass-link">← Back to Sign In</a></p>
    </form>
    
    <div class="auth-glass-divider"><span>or</span></div>
    <button id="googleBtn" class="auth-glass-btn auth-glass-btn-outline"><i class="fab fa-google"></i> Continue with Google</button>
    
    <div class="auth-glass-footer">
      <span id="toggleText" class="auth-glass-muted">No account?</span>
      <a href="#" id="toggleLink" class="auth-glass-link">Sign Up</a>
      <span class="auth-glass-dot" style="display:inline-block;margin:0 8px">•</span>
      <a href="register.html" class="auth-glass-link">Register</a>
    </div>
    <div class="auth-glass-policy">
      <a href="privacy.html" target="_blank" class="auth-glass-link">Privacy</a>
      <span class="auth-glass-dot">•</span>
      <a href="terms.html" target="_blank" class="auth-glass-link">Terms</a>
    </div>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script>
// ===== PARTICLES =====
(function(){var c=document.getElementById('particles-canvas');if(!c)return;for(var i=0;i<25;i++){var p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(12+Math.random()*20)+'s';p.style.animationDelay=Math.random()*20+'s';p.style.width=p.style.height=(2+Math.random()*3)+'px';c.appendChild(p)}})();

// ===== 3D TILT =====
(function(){var ct=document.getElementById('authContainer');if(!ct)return;
ct.addEventListener('touchmove',function(e){var t=e.touches[0];if(!t)return;var r=ct.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=(t.clientX-cx)/(r.width/2),dy=(t.clientY-cy)/(r.height/2),rx=Math.max(-6,Math.min(6,-dy*5)),ry=Math.max(-6,Math.min(6,dx*5));ct.style.transform='perspective(600px) rotateX('+rx+'deg) rotateY('+ry+'deg) scale3d(1.02,1.02,1.02)'},{passive:true});
ct.addEventListener('touchend',function(){ct.style.transform='perspective(600px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)';ct.style.transition='transform 0.5s cubic-bezier(0.23,1,0.32,1)';setTimeout(function(){if(ct)ct.style.transition=''},500)},{passive:true});
ct.addEventListener('mousemove',function(e){var r=ct.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=(e.clientX-cx)/(r.width/2),dy=(e.clientY-cy)/(r.height/2),rx=Math.max(-4,Math.min(4,-dy*3)),ry=Math.max(-4,Math.min(4,dx*3));ct.style.transform='perspective(600px) rotateX('+rx+'deg) rotateY('+ry+'deg) scale3d(1.01,1.01,1.01)';ct.style.transition='transform 0.15s ease-out'});
ct.addEventListener('mouseleave',function(){ct.style.transform='perspective(600px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)';ct.style.transition='transform 0.5s cubic-bezier(0.23,1,0.32,1)';setTimeout(function(){if(ct)ct.style.transition=''},500)});})();

// ===== AUTH BOOT =====
var _authCheckDone = false;
var _loadingEl = document.getElementById('authLoading');
var _pageEl = document.getElementById('authPageWrap');

function showPage() {
  if (_loadingEl) _loadingEl.classList.remove('show');
  if (_pageEl) _pageEl.style.display = 'block';
  _authCheckDone = true;
}

function goHome() {
  window.location.href = 'home.html';
}

// Loading timeout: show auth forms even if Firebase never fires
setTimeout(function() {
  if (!_authCheckDone) showPage();
}, 8000);

// SINGLE source of truth: onAuthStateChanged handles ALL redirects
auth.onAuthStateChanged(function(user) {
  _authCheckDone = true;
  if (user) {
    goHome(); // Redirect to dashboard immediately
  } else {
    showPage(); // Not logged in → show auth forms
  }
});

// Handle Google redirect result (backup — for signInWithRedirect flow)
auth.getRedirectResult().then(function(result) {
  if (result && result.user) {
    _authCheckDone = true;
    goHome();
  }
}).catch(function() {
  // getRedirectResult can throw if no redirect happened — ignore
});
</script>
</body>
</html>
