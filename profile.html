<body class="dark-mode">

<nav class="top-nav">
  <div class="nav-inner">
    <div class="nav-logo" onclick="location.href='dashboard.html'">EARNNOVA</div>
    <div class="nav-right">
      <div class="nav-balance" id="navBalance">$0.00</div>
    </div>
  </div>
</nav>

<nav class="bottom-nav">
  <div class="nav-item" data-page="dashboard" onclick="location.href='dashboard.html'"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></div>
  <div class="nav-item" data-page="earn" onclick="location.href='earn.html'"><div class="nav-icon">📺</div><div class="nav-label">Earn</div></div>
  <div class="nav-item" data-page="withdraw" onclick="location.href='withdraw.html'"><div class="nav-icon">💳</div><div class="nav-label">Cashout</div></div>
  <div class="nav-item" data-page="referrals" onclick="location.href='referrals.html'"><div class="nav-icon">👥</div><div class="nav-label">Refer</div></div>
  <div class="nav-item active" data-page="profile" onclick="location.href='profile.html'"><div class="nav-icon">👤</div><div class="nav-label">Profile</div></div>
</nav>
<div class="main-content" id="mainContent">
  <!-- PAGE: PROFILE -->
  <div class="page-view" id="pageProfile">
    <div class="profile-head">
      <div class="profile-avatar" id="profileAvatar">U</div>
      <div class="profile-name" data-name>User</div>
      <div class="profile-email" data-email>email@example.com</div>
    </div>

    <div class="glass-card">
      <div class="setting-item"><div class="setting-left"><div class="setting-icon" style="background:rgba(212,175,55,0.1);color:var(--gold)"><i class="fas fa-user"></i></div><div><div class="setting-label">Name</div><div class="setting-desc" data-name>User</div></div></div></div>
      <div class="setting-item"><div class="setting-left"><div class="setting-icon" style="background:rgba(59,130,246,0.1);color:#3B82F6"><i class="fas fa-envelope"></i></div><div><div class="setting-label">Email</div><div class="setting-desc" data-email>email@example.com</div></div></div></div>
      <div class="setting-item"><div class="setting-left"><div class="setting-icon" style="background:rgba(139,92,246,0.1);color:#8B5CF6"><i class="fas fa-id-card"></i></div><div><div class="setting-label">User ID</div><div class="setting-desc text-xs" id="profileUserID">------</div></div></div></div>
      <div class="setting-item"><div class="setting-left"><div class="setting-icon" style="background:rgba(16,185,129,0.1);color:var(--emerald)"><i class="fas fa-trophy"></i></div><div><div class="setting-label">Total Earned</div><div class="setting-desc text-gold fw-600" data-earned>$0.00</div></div></div></div>
      <div class="setting-item"><div class="setting-left"><div class="setting-icon" style="background:rgba(139,92,246,0.1);color:#8B5CF6"><i class="fas fa-eye"></i></div><div><div class="setting-label">Ads Watched</div><div class="setting-desc" data-watched>0</div></div></div></div>
      <div class="setting-item" style="cursor:pointer" onclick="editProfile()"><div class="setting-left"><div class="setting-icon" style="background:rgba(16,185,129,0.1);color:var(--emerald)"><i class="fas fa-pen"></i></div><div><div class="setting-label">Edit Profile</div><div class="setting-desc">Change name, photo, phone</div></div></div><i class="fas fa-chevron-right" style="color:var(--text-muted);font-size:12px"></i></div>
    </div>

    <div class="glass-card">
      <div class="setting-item"><div class="setting-left"><div class="setting-icon" style="background:rgba(239,68,68,0.1);color:var(--red)"><i class="fas fa-bell"></i></div><div><div class="setting-label">Notifications</div><div class="setting-desc">Get notified about earnings</div></div></div><div class="toggle on" id="notifToggle" onclick="this.classList.toggle('on')"></div></div>
      <div class="setting-item"><div class="setting-left"><div class="setting-icon" style="background:rgba(245,158,11,0.1);color:var(--amber)"><i class="fas fa-moon"></i></div><div><div class="setting-label">Dark Mode</div><div class="setting-desc">Toggle light/dark theme</div></div></div><div class="toggle on" id="themeToggle"></div></div>
    </div>

    <button class="btn-ghost w-full mt-3" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
  </div>

</div>
</div>
<button class="fab" onclick="location.href='earn.html'" title="Watch Ad">📺</button>
<div id="toast" class="toast"></div>
<div class="modal-overlay" id="userDetailModal" onclick="if(event.target===this)this.classList.remove('show')"><div class="modal-content" style="max-width:380px;padding:16px;border-radius:16px" id="userDetailContent"></div></div>
<div class="modal-overlay" id="adModal" onclick="if(event.target===this)closeAd()"><div class="ad-modal-content" id="adModalContent"></div></div>

<script>
var EN_PAGE = 'profile';
function navigate(page) {
  if (page === 'admin') { document.getElementById('adminPanel')?.classList.add('show'); return; }
  location.href = page + '.html';
}
</script>
