<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EARNNOVA — Sign Up</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
body{margin:0;background:#080A12;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;box-sizing:border-box}
.auth-wrap{width:100%;max-width:400px}
.auth-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(24px) saturate(140%);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:32px 24px;box-shadow:0 16px 80px rgba(0,0,0,0.3)}
.auth-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 16px;box-shadow:0 8px 32px rgba(16,185,129,0.2)}
.auth-title{font-size:22px;font-weight:800;text-align:center}
.auth-subtitle{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;margin:4px 0 24px}
.auth-input-group{margin-bottom:14px}
.auth-input-group label{font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:1px}
.auth-input-wrap{display:flex;align-items:center;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);transition:all 0.2s}
.auth-input-wrap:focus-within{border-color:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,0.1)}
.auth-input-wrap i{color:rgba(255,255,255,0.2);width:18px;font-size:14px}
.auth-input-wrap input{background:none;border:none;outline:none;color:#fff;font-size:14px;width:100%;margin-left:10px}
.auth-input-wrap input::placeholder{color:rgba(255,255,255,0.15)}
.btn-auth{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.25s;margin-top:8px}
.btn-auth:active{transform:scale(0.98)}
.btn-auth:disabled{opacity:0.5;cursor:not-allowed}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.3)}
.auth-footer a{color:#10B981;text-decoration:none;font-weight:600}
.auth-alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.auth-alert.error{display:block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#FCA5A5}
.auth-alert.success{display:block;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#6EE7B7}
.terms-row{display:flex;align-items:flex-start;gap:8px;margin:16px 0;font-size:12px;color:rgba(255,255,255,0.3)}
.terms-row input{accent-color:#10B981;margin-top:2px}
.terms-row a{color:#10B981;text-decoration:none}
.benefits{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.benefit{padding:10px;border-radius:10px;background:rgba(255,255,255,0.03);text-align:center}
.benefit-icon{font-size:18px}
.benefit-text{font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px}
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">E</div>
    <div class="auth-title">Create Account</div>
    <div class="auth-subtitle">Start earning in minutes</div>

    <div class="benefits">
      <div class="benefit"><div class="benefit-icon">📺</div><div class="benefit-text">Watch Ads</div></div>
      <div class="benefit"><div class="benefit-icon">💰</div><div class="benefit-text">Earn Rewards</div></div>
      <div class="benefit"><div class="benefit-icon">💳</div><div class="benefit-text">Withdraw Anytime</div></div>
      <div class="benefit"><div class="benefit-icon">👥</div><div class="benefit-text">Refer Friends</div></div>
    </div>

    <div class="auth-alert" id="alertBox"></div>

    <form id="registerForm">
      <div class="auth-input-group">
        <label>Full Name</label>
        <div class="auth-input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="regName" placeholder="John Doe" required>
        </div>
      </div>
      <div class="auth-input-group">
        <label>Email</label>
        <div class="auth-input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="regEmail" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="auth-input-group">
        <label>Password</label>
        <div class="auth-input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="regPassword" placeholder="Minimum 6 characters" required minlength="6">
        </div>
      </div>
      <div class="auth-input-group">
        <label>Referral Code (optional)</label>
        <div class="auth-input-wrap">
          <i class="fas fa-gift"></i>
          <input type="text" id="regReferral" placeholder="Enter referral code">
        </div>
      </div>

      <label class="terms-row">
        <input type="checkbox" id="agreeTerms" checked>
        <span>I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></span>
      </label>

      <button type="submit" id="registerBtn" class="btn-auth">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>
  <div style="text-align:center;margin-top:16px;font-size:11px;color:rgba(255,255,255,0.15)">
    <a href="privacy.html" style="color:rgba(255,255,255,0.15);text-decoration:none">Privacy</a> • 
    <a href="terms.html" style="color:rgba(255,255,255,0.15);text-decoration:none">Terms</a>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script>
var alertBox = document.getElementById('alertBox');

function showAlert(msg, type) {
  alertBox.textContent = msg;
  alertBox.className = 'auth-alert ' + (type || 'error');
}

document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var name = document.getElementById('regName').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var password = document.getElementById('regPassword').value;
  var ref = document.getElementById('regReferral').value.trim().toUpperCase();
  var btn = document.getElementById('registerBtn');

  if (!document.getElementById('agreeTerms').checked) {
    showAlert('Please agree to the Terms of Service', 'error');
    return;
  }
  if (password.length < 6) { showAlert('Password must be 6+ characters', 'error'); return; }
  if (isDisposableEmail(email)) { showAlert('Temporary emails are not allowed', 'error'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ Creating account...';

  try {
    var cred = await auth.createUserWithEmailAndPassword(email, password);
    var user = cred.user;
    await user.updateProfile({ displayName: name });

    // Create user document
    var refCode = Math.random().toString(36).substring(2, 10).toUpperCase();
    var userData = {
      uid: user.uid, email: email, name: name, photo: '', phone: '',
      balance: 0, totalEarned: 0, totalWithdrawn: 0, adsWatched: 0,
      todayAds: 0, lastAdDate: '', referralCode: refCode, referredBy: '',
      isActive: true, isAdmin: user.email === ADMIN_EMAIL,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastLogin: firebase.firestore.FieldValue.serverTimestamp()
    };

    // Handle referral
    if (ref && db) {
      try {
        var refSnap = await fbTimeout(usersRef.where('referralCode', '==', ref).get());
        if (!refSnap.empty) {
          var referrer = refSnap.docs[0];
          userData.referredBy = referrer.id;
          await usersRef.doc(referrer.id).update({
            balance: firebase.firestore.FieldValue.increment(0.50),
            totalEarned: firebase.firestore.FieldValue.increment(0.50),
            referralCount: firebase.firestore.FieldValue.increment(1)
          });
          await referralsRef.add({
            referrerId: referrer.id, referredId: user.uid,
            referredName: name, bonus: 0.50,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      } catch(er) { console.warn('Referral error:', er); }
    }

    await usersRef.doc(user.uid).set(userData);
    btn.textContent = '✅ Account created!';

  } catch(err) {
    showAlert(getAuthError(err), 'error');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});

// Auth state redirect
auth.onAuthStateChanged(function(user) {
  if (user) window.location.href = 'home.html';
});
</script>
</body>
</html>
