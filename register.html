<script>
// ===== STEP MANAGEMENT =====
var regEmail = '';
var regName = '';
var regPassword = '';
var regRef = '';
var regUserId = '';
var otpCooldown = 60;
var otpTimerInterval = null;
var pendingOTPData = null;

function showAlert(msg, type, targetId) {
  var el = document.getElementById(targetId || 'alertBox');
  if (!el) return;
  el.textContent = msg;
  el.className = 'auth-alert show ' + (type || 'error');
}

function clearAlert(targetId) {
  var el = document.getElementById(targetId || 'alertBox');
  if (el) el.className = 'auth-alert';
}

function showStep(step) {
  document.getElementById('stepForm').style.display = step === 'form' ? 'block' : 'none';
  // OTP step moved to verify.html
  document.getElementById('stepSuccess').style.display = step === 'success' ? 'block' : 'none';
}

// OTP input navigation
function otpMove(current, nextId) {
  if (current.value.length >= 1) {
    current.classList.add('filled');
    if (nextId <= 6) document.getElementById('otp' + nextId)?.focus();
  }
  // Auto-check if all filled
  var full = '';
  for (var i = 1; i <= 6; i++) {
    var v = document.getElementById('otp' + i)?.value || '';
    if (!v) return;
    full += v;
  }
}

function otpBack(event, prevId) {
  if (event.key === 'Backspace' && !event.target.value && prevId > 1) {
    document.getElementById('otp' + (prevId-1))?.focus();
  }
}

// ===== STEP 1: REGISTRATION FORM SUBMIT =====
document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  clearAlert();
  
  regName = document.getElementById('regName').value.trim();
  regEmail = document.getElementById('regEmail').value.trim();
  regPassword = document.getElementById('regPassword').value;
  regRef = document.getElementById('regReferral').value.trim().toUpperCase();
  var btn = document.getElementById('registerBtn');

  if (!document.getElementById('agreeTerms').checked) {
    showAlert('Please agree to the Terms of Service', 'error');
    return;
  }
  if (regPassword.length < 6) { showAlert('Password must be 6+ characters', 'error'); return; }
  if (regEmail !== ADMIN_EMAIL && isDisposableEmail(regEmail)) { showAlert('Temporary emails not allowed', 'error'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ Creating account...';

  try {
    // 1. Create Firebase Auth user
    var cred = await auth.createUserWithEmailAndPassword(regEmail, regPassword);
    var user = cred.user;
    await user.updateProfile({ displayName: regName });
    regUserId = user.uid;

    // 2. Generate OTP and store in Firestore
    var otpCode = String(Math.floor(100000 + Math.random() * 900000));
    var expiresAt = new Date(Date.now() + 10 * 60 * 1000); // 10 min valid
    
    await db.collection('otp_codes').add({
      code: otpCode,
      used: false,
      email: regEmail,
      userId: user.uid,
      name: regName,
      referralCode: regRef || '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      expiresAt: expiresAt
    });
    
    // 3. Send OTP via email (simulated - logs to console, in production use EmailJS/SendGrid)
    sendOTPEmail(regEmail, otpCode, regName);
    
    // 4. Show OTP step
    document.getElementById('otpEmailDisplay').textContent = regEmail;
    showAlert('📨 OTP sent to ' + regEmail + ' (check console if not received)', 'info', 'otpAlert');
    showStep('otp');
    
    // 5. Focus first input
    setTimeout(function() { document.getElementById('otp1')?.focus(); }, 300);
    
    // 6. Start cooldown
    startOTPTimer();
    
    btn.textContent = '✅ OTP Sent!';
    btn.disabled = false;
    
  } catch(err) {
    showAlert(getAuthError(err), 'error');
    btn.disabled = false;
    btn.textContent = '📨 Register & Get OTP';
    
    // If user was created but error in OTP, clean up
    if (regUserId) {
      try { auth.currentUser?.delete(); } catch(e) {}
      regUserId = '';
    }
  }
});

// ===== RESEND OTP =====
function resendRegistrationOTP() {
  if (otpCooldown > 0 && otpCooldown < 60) {
    showAlert('⏳ Please wait ' + otpCooldown + 's', 'error', 'otpAlert');
    return;
  }
  
  if (!regUserId || !regEmail) {
    showAlert('Session expired. Please register again.', 'error', 'otpAlert');
    return;
  }
  
  document.getElementById('resendOTPBtn').disabled = true;
  document.getElementById('resendOTPBtn').textContent = '⏳ Sending...';
  
  var otpCode = String(Math.floor(100000 + Math.random() * 900000));
  var expiresAt = new Date(Date.now() + 10 * 60 * 1000);
  
  db.collection('otp_codes').add({
    code: otpCode, used: false, email: regEmail,
    userId: regUserId, name: regName,
    referralCode: regRef || '',
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    expiresAt: expiresAt
  }).then(function() {
    sendOTPEmail(regEmail, otpCode, regName);
    showAlert('📨 New OTP sent to ' + regEmail, 'info', 'otpAlert');
    document.getElementById('resendOTPBtn').disabled = false;
    document.getElementById('resendOTPBtn').textContent = '🔄 Resend Code';
    startOTPTimer();
    
    // Clear inputs
    for (var i = 1; i <= 6; i++) {
      var inp = document.getElementById('otp' + i);
      if (inp) { inp.value = ''; inp.classList.remove('filled'); }
    }
    document.getElementById('otp1')?.focus();
  }).catch(function(err) {
    showAlert('Error: ' + err.message, 'error', 'otpAlert');
    document.getElementById('resendOTPBtn').disabled = false;
    document.getElementById('resendOTPBtn').textContent = '🔄 Resend Code';
  });
}

// ===== OTP TIMER =====
function startOTPTimer() {
  otpCooldown = 60;
  if (otpTimerInterval) clearInterval(otpTimerInterval);
  
  document.getElementById('otpTimer').innerHTML = 'Resend in <strong>' + otpCooldown + 's</strong>';
  
  otpTimerInterval = setInterval(function() {
    otpCooldown--;
    if (otpCooldown <= 0) {
      clearInterval(otpTimerInterval);
      document.getElementById('otpTimer').innerHTML = 'You can resend now';
    } else {
      document.getElementById('otpTimer').innerHTML = 'Resend in <strong>' + otpCooldown + 's</strong>';
    }
  }, 1000);
}

// ===== STEP 2: VERIFY OTP =====
function verifyRegistrationOTP() {
  clearAlert('otpAlert');
  
  var otpCode = '';
  for (var i = 1; i <= 6; i++) {
    otpCode += document.getElementById('otp' + i)?.value || '';
  }
  
  if (otpCode.length !== 6) {
    showAlert('⚠️ Enter the complete 6-digit code', 'error', 'otpAlert');
    return;
  }
  
  var btn = document.getElementById('verifyOTPBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Verifying...';
  
  showAlert('🔍 Checking OTP...', 'info', 'otpAlert');
  
  // Look up OTP in Firestore
  db.collection('otp_codes')
    .where('code', '==', otpCode)
    .where('used', '==', false)
    .where('email', '==', regEmail)
    .get()
    .then(function(snap) {
      if (snap.empty) {
        showAlert('❌ Invalid OTP code. Check and try again.', 'error', 'otpAlert');
        btn.disabled = false;
        btn.textContent = '✅ Verify & Complete';
        return;
      }
      
      var doc = snap.docs[0];
      var data = doc.data();
      var expiry = data.expiresAt ? data.expiresAt.toDate() : new Date();
      
      if (Date.now() > expiry.getTime()) {
        showAlert('⏰ OTP expired! Request a new one.', 'error', 'otpAlert');
        db.collection('otp_codes').doc(doc.id).update({ used: true });
        btn.disabled = false;
        btn.textContent = '✅ Verify & Complete';
        return;
      }
      
      // OTP VALID — Create the user document
      var refCode = Math.random().toString(36).substring(2, 10).toUpperCase();
      var userData = {
        uid: regUserId,
        email: regEmail,
        name: regName,
        photo: '', phone: '',
        balance: 0, totalEarned: 0, totalWithdrawn: 0,
        adsWatched: 0, todayAds: 0, lastAdDate: '',
        referralCode: refCode,
        referredBy: '',
        referralBonusPaid: false,
        regIp: '0.0.0.0',
        isActive: true,
        emailVerified: true,
        otpVerified: true,
        isAdmin: regEmail === ADMIN_EMAIL,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
      };
      
      // Get IP
      try {
        fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }).then(function(d) {
          userData.regIp = d.ip;
          // Save with IP
          finalizeRegistration(userData, doc.id, otpCode);
        }).catch(function() { finalizeRegistration(userData, doc.id, otpCode); });
      } catch(e) { finalizeRegistration(userData, doc.id, otpCode); }
    })
    .catch(function(err) {
      showAlert('❌ Error: ' + err.message, 'error', 'otpAlert');
      btn.disabled = false;
      btn.textContent = '✅ Verify & Complete';
    });
}

function finalizeRegistration(userData, otpDocId, otpCode) {
  // Handle referral if any
  var ref = regRef || document.getElementById('regReferral')?.value?.trim()?.toUpperCase() || '';
  
  var saveUser = function() {
    return db.collection('users').doc(regUserId).set(userData);
  };
  
  saveUser().then(function() {
    // Mark OTP as used
    return db.collection('otp_codes').doc(otpDocId).update({ used: true, verifiedAt: firebase.firestore.FieldValue.serverTimestamp() });
  }).then(function() {
    // Handle referral
    if (ref) {
      return db.collection('users').where('referralCode', '==', ref).get().then(function(refSnap) {
        if (!refSnap.empty) {
          var referrer = refSnap.docs[0];
          return db.collection('users').doc(referrer.id).update({
            referralCount: firebase.firestore.FieldValue.increment(1)
          }).then(function() {
            return db.collection('referrals').add({
              referrerId: referrer.id, referredId: regUserId,
              referredName: regName, bonus: 0.50, bonusPaid: false,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          });
        }
      });
    }
  }).then(function() {
    // Success!

function showAlert(msg, type) {
  alertBox.textContent = msg;
  alertBox.className = 'auth-alert ' + (type || 'error');
}

document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var name = document.getElementById('regName').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var password = document.getElementById('regPassword').value;
  var ref = document.getElementById('regReferral').value.trim().toUpperCase();
  var btn = document.getElementById('registerBtn');

  if (!document.getElementById('agreeTerms').checked) {
    showAlert('Please agree to the Terms of Service', 'error');
    return;
  }
  if (password.length < 6) { showAlert('Password must be 6+ characters', 'error'); return; }
  // Skip disposable email check for admin
  if (email !== ADMIN_EMAIL && isDisposableEmail(email)) { showAlert('Temporary emails are not allowed', 'error'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ Checking...';

  // Get user IP
  var userIp = '0.0.0.0';
  // Skip IP check entirely for admin accounts
  if (email === ADMIN_EMAIL) {
    userIp = '127.0.0.' + Math.floor(Math.random() * 255);
  } else {
    btn.textContent = '⏳ Getting IP...';
    try {
      var ipResp = await fetch('https://api.ipify.org?format=json');
      var ipData = await ipResp.json();
      userIp = ipData.ip;
    } catch(e) { showAlert('Could not verify network. Please check connection.', 'error'); btn.disabled=false; btn.textContent='Create Account'; return; }

    // One IP = One Account check (skip for admin)
    btn.textContent = '⏳ Checking IP...';
    if (db) {
      try {
        var ipSnap = await fbTimeout(usersRef.where('regIp', '==', userIp).get());
        if (!ipSnap.empty) {
          showAlert('⚠️ One account per IP address only. You already registered from this IP.', 'error');
          btn.disabled=false;
          btn.textContent='Create Account';
          return;
        }
      } catch(e) { console.warn('IP check error:', e); }
    }
  }

  btn.textContent = '⏳ Creating account...';

  try {
    var cred = await auth.createUserWithEmailAndPassword(email, password);
    var user = cred.user;
    await user.updateProfile({ displayName: name });

    // Create user document
    var refCode = Math.random().toString(36).substring(2, 10).toUpperCase();
    var userData = {
      uid: user.uid, email: email, name: name, photo: '', phone: '',
      balance: 0, totalEarned: 0, totalWithdrawn: 0, adsWatched: 0,
      todayAds: 0, lastAdDate: '', referralCode: refCode, referredBy: '',
      referralBonusPaid: false, regIp: userIp,
      isActive: true, isAdmin: user.email === ADMIN_EMAIL,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastLogin: firebase.firestore.FieldValue.serverTimestamp()
    };

    // Handle referral — save but DON'T credit bonus yet
    if (ref && db) {
      try {
        var refSnap = await fbTimeout(usersRef.where('referralCode', '==', ref).get());
        if (!refSnap.empty) {
          var referrer = refSnap.docs[0];
          userData.referredBy = referrer.id;
          await usersRef.doc(referrer.id).update({
            referralCount: firebase.firestore.FieldValue.increment(1)
          });
          await referralsRef.add({
            referrerId: referrer.id, referredId: user.uid,
            referredName: name, bonus: 0.50, bonusPaid: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      } catch(er) { console.warn('Referral error:', er); }
    }

    await usersRef.doc(user.uid).set(userData);
    btn.textContent = '✅ Account created!';
    
    // Redirect if auth=redirect mode
    var params = new URLSearchParams(window.location.search);
    if (params.get('auth') === 'redirect') {
      var redir = params.get('redirect') || 'home.html';
      setTimeout(function() { window.location.href = redir; }, 1500);
    } else {
      setTimeout(function() { window.location.href = 'home.html'; }, 1500);
    }
    return; // Prevent catch from running

  } catch(err) {
    showAlert(getAuthError(err), 'error');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});

// Auth state redirect — supports auth=redirect & token params
(function() {
  var params = new URLSearchParams(window.location.search);
  var authMode = params.get('auth');
  var redirUrl = params.get('redirect') || 'home.html';
  var token = params.get('token');

  // Handle token — decode if present
  if (token) {
    console.log('🔑 Registration token:', token);
    // Store token for post-registration flow
    localStorage.setItem('en_reg_token', token);
    
    // If token looks like a referral code (uppercase alphanumeric 6-10 chars), prefill it
    if (/^[A-Z0-9]{6,10}$/.test(token)) {
      var refInput = document.getElementById('regReferral');
      if (refInput && !refInput.value) {
        refInput.value = token;
        refInput.style.borderColor = '#10B981';
        refInput.style.boxShadow = '0 0 0 3px rgba(16,185,129,0.15)';
      }
    }
    
    // If token contains user data (base64 encoded JSON payload)
    try {
      var decoded = atob(token.replace(/-/g, '+').replace(/_/g, '/'));
      var payload = JSON.parse(decoded);
      if (payload.email) document.getElementById('regEmail').value = payload.email;
      if (payload.name) document.getElementById('regName').value = payload.name;
      if (payload.ref) {
        var refInput2 = document.getElementById('regReferral');
        if (refInput2 && !refInput2.value) refInput2.value = payload.ref;
      }
    } catch(e) { /* not a JSON token, ignore */ }
  }

  // auth=redirect mode: after login/register, redirect back
  if (authMode === 'redirect') {
    console.log('🔄 Auth redirect mode enabled →', redirUrl);
  }

  // Override the auth redirect
  auth.onAuthStateChanged(function(user) {
    if (user) {
      if (authMode === 'redirect') {
        window.location.href = redirUrl;
      } else {
        window.location.href = 'home.html';
      }
    }
  });
})();
