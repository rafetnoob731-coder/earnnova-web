<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EARN NOVA — Register</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
body{margin:0;background:#080A12;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;box-sizing:border-box}
.auth-wrap{width:100%;max-width:400px}
.auth-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(24px) saturate(140%);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:32px 24px;box-shadow:0 16px 80px rgba(0,0,0,0.3)}
.auth-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 16px;box-shadow:0 8px 32px rgba(16,185,129,0.2)}
.auth-title{font-size:22px;font-weight:800;text-align:center;color:#fff}
.auth-subtitle{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;margin:4px 0 24px}
.auth-input-group{margin-bottom:14px}
.auth-input-group label{font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:1px}
.auth-input-wrap{display:flex;align-items:center;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);transition:all 0.2s}
.auth-input-wrap:focus-within{border-color:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,0.1)}
.auth-input-wrap i{color:rgba(255,255,255,0.2);width:18px;font-size:14px}
.auth-input-wrap input{background:none;border:none;outline:none;color:#fff;font-size:14px;width:100%;margin-left:10px}
.auth-input-wrap input::placeholder{color:rgba(255,255,255,0.15)}
.btn-auth{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.25s;margin-top:8px}
.btn-auth:active{transform:scale(0.98)}
.btn-auth:disabled{opacity:0.5;cursor:not-allowed}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.3)}
.auth-footer a{color:#10B981;text-decoration:none;font-weight:600}
.auth-alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.auth-alert.error{display:block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#FCA5A5}
.auth-alert.success{display:block;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#6EE7B7}
.terms-row{display:flex;align-items:flex-start;gap:8px;margin:16px 0;font-size:12px;color:rgba(255,255,255,0.3)}
.terms-row input{accent-color:#10B981;margin-top:2px}
.terms-row a{color:#10B981;text-decoration:none}
.benefits{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.benefit{padding:10px;border-radius:10px;background:rgba(255,255,255,0.03);text-align:center}
.benefit-icon{font-size:18px}
.benefit-text{font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card" id="registerCard">
    <div class="auth-logo">E</div>
    <div id="stepForm">
      <div class="auth-title">Create Account</div>
      <div class="auth-subtitle">Create your account • verify via email</div>
      <div id="regAlert" class="auth-alert"></div>
      <div class="auth-input-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <div class="auth-input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="regName" placeholder="John Doe" autocomplete="name">
        </div>
      </div>
      <div class="auth-input-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <div class="auth-input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>
      <div class="auth-input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <div class="auth-input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
        </div>
      </div>
      <div class="auth-input-group">
        <label><i class="fas fa-gift"></i> Referral Code (optional)</label>
        <div class="auth-input-wrap">
          <i class="fas fa-gift"></i>
          <input type="text" id="regReferral" placeholder="Enter code" maxlength="10" style="text-transform:uppercase">
        </div>
      </div>
      <div class="terms-row">
        <input type="checkbox" id="regTerms">
        <label for="regTerms">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> &amp; <a href="privacy.html" target="_blank">Privacy Policy</a></label>
      </div>
      <button class="btn-auth" id="regBtn" onclick="handleRegister()">Create Account</button>
    </div>
    <div id="stepVerify" style="display:none">
      <div class="auth-title">Check Your Email</div>
      <div class="auth-subtitle">We sent a verification code to <strong id="verifyEmail" style="color:#10B981"></strong></div>
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:48px;margin-bottom:12px">📧</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:16px">A 6-digit code was sent to your email</div>
        <button class="btn-auth" onclick="goToVerifyPage()" style="background:linear-gradient(135deg,#d4af37,#b8960f)">Go to Verify Page</button>
      </div>
    </div>
    <div class="auth-footer">
      Already have an account? <a href="login.html" id="loginLink">Sign In</a>
    </div>
  </div>
</div>
<script>
var firebaseConfig={apiKey:"AIzaSyAoo2-X5ILICXR2mFAyUhqJYpvScChlsOc",authDomain:"earnnovabeta.firebaseapp.com",projectId:"earnnovabeta",storageBucket:"earnnovabeta.appspot.com",messagingSenderId:"1058802392633",appId:"1:1058802392633:web:xxxxxxxxxxxx"};
firebase.initializeApp(firebaseConfig);
var auth=firebase.auth();
var db=firebase.firestore();
var urlParams=new URLSearchParams(window.location.search);
(function(){var l=document.getElementById('loginLink');if(l){var p=['auth','redirect','token'];var q=[];for(var i=0;i<p.length;i++){var v=urlParams.get(p[i]);if(v)q.push(p[i]+'='+encodeURIComponent(v))}if(q.length>0)l.href='login.html?'+q.join('&')}})();
(function(){var r=urlParams.get('ref')||'';var t=urlParams.get('token')||'';if(r){var i=document.getElementById('regReferral');if(i){i.value=r.toUpperCase();i.style.borderColor='#10B981';i.style.boxShadow='0 0 0 3px rgba(16,185,129,0.15)'}}if(t&&!r){try{var d=atob(t);var p=d.split('|');if(p.length>=2){if(p[0])document.getElementById('regEmail').value=p[0];if(p[1])document.getElementById('regReferral').value=p[1].toUpperCase()}}catch(e){}}})();
function handleRegister(){var n=document.getElementById('regName').value.trim();var e=document.getElementById('regEmail').value.trim();var p=document.getElementById('regPassword').value;var r=document.getElementById('regReferral').value.trim().toUpperCase();var t=document.getElementById('regTerms').checked;var a=document.getElementById('regAlert');var b=document.getElementById('regBtn');if(!n){showAlert('Please enter your name','error');return}if(!e){showAlert('Please enter your email','error');return}if(!p||p.length<6){showAlert('Password must be at least 6 characters','error');return}if(!t){showAlert('Please agree to the Terms of Service','error');return}b.disabled=true;b.textContent='Creating Account...';fetch('https://api.ipify.org?format=json').then(function(r){return r.json()}).then(function(d){var ip=d.ip;return db.collection('users').where('regIp','==',ip).get()}).then(function(s){if(!s.empty){showAlert('An account already exists from this IP address','error');b.disabled=false;b.textContent='Create Account';return null}return registerUser(n,e,p,r)}).catch(function(){return registerUser(n,e,p,r)})}
function registerUser(n,e,p,r){return auth.createUserWithEmailAndPassword(e,p).then(function(c){var u=c.user;return u.updateProfile({displayName:n}).then(function(){return{user:u}})}).then(function(r){var u=r.user;var uid=u.uid;var otp=String(Math.floor(100000+Math.random()*900000));return db.collection('otp_codes').doc(uid).set({email:e,otp:otp,name:n,referral:r||'',created:firebase.firestore.FieldValue.serverTimestamp(),expires:new Date(Date.now()+10*60*1000),used:false}).then(function(){console.log('📧 OTP for '+e+': '+otp);document.getElementById('stepForm').style.display='none';document.getElementById('verifyEmail').textContent=e;document.getElementById('stepVerify').style.display='block';setTimeout(function(){window.location.href='verify.html?email='+encodeURIComponent(e)+'&uid='+uid+'&new=1'},2000)})}).catch(function(err){var m=err.message||'Registration failed';if(err.code==='auth/email-already-in-use')m='Email already registered';else if(err.code==='auth/weak-password')m='Password too weak (min 6 chars)';else if(err.code==='auth/invalid-email')m='Invalid email address';showAlert(m,'error');b.disabled=false;b.textContent='Create Account'})}
function goToVerifyPage(){var e=document.getElementById('verifyEmail').textContent;var u=auth.currentUser?auth.currentUser.uid:'';window.location.href='verify.html?email='+encodeURIComponent(e)+'&uid='+u+'&new=1'}
function showAlert(m,t){var e=document.getElementById('regAlert');e.textContent=m;e.className='auth-alert '+t}
</script>
</body>
</html>
