<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Verify OTP | EARN NOVA</title>
<style>
:root{--bg:#0F172A;--bg2:#0A0E1A;--gold:#d4af37;--emerald:#10B981;--text:#F0F0F4;--text-muted:rgba(240,240,244,0.4);--font:'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-wrap{width:100%;max-width:400px}
.auth-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:32px 24px;box-shadow:0 16px 80px rgba(0,0,0,0.3)}
.auth-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;margin:0 auto 16px;box-shadow:0 8px 32px rgba(16,185,129,0.2)}
.auth-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px}
.auth-subtitle{font-size:12px;color:rgba(255,255,255,0.4);text-align:center;margin:4px 0 20px;line-height:1.5}
.auth-subtitle strong{color:var(--gold)}
.otp-group{display:flex;gap:6px;justify-content:center;margin:16px 0}
.otp-box{width:44px;height:50px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#fff;font-size:22px;font-weight:700;text-align:center;outline:none;transition:0.2s;font-family:monospace}
.otp-box:focus{border-color:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,0.1)}
.otp-box.filled{border-color:rgba(16,185,129,0.2);background:rgba(16,185,129,0.04)}
.btn-auth{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:0.25s;margin-top:8px}
.btn-auth:hover{opacity:0.9;transform:translateY(-1px)}
.btn-auth:disabled{opacity:0.5;cursor:not-allowed}
.btn-outline{width:100%;padding:12px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;transition:0.2s;margin-top:6px}
.btn-outline:hover{border-color:rgba(255,255,255,0.1);color:#fff}
.alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none;text-align:center}
.alert.show{display:block}
.alert.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#FCA5A5}
.alert.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#6EE7B7}
.alert.info{background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.2);color:#FCD34D}
.footer{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.3)}
.footer a{color:#10B981;text-decoration:none;font-weight:600}
.timer{text-align:center;font-size:12px;color:rgba(255,255,255,0.3);margin-top:8px}
.timer strong{color:#d4af37}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">E</div>
    <div class="auth-title">📨 Verify Email</div>
    <div class="auth-subtitle">Enter the 6-digit code sent to<br><strong id="emailDisplay">your email</strong></div>
    
    <div id="alertBox" class="alert"></div>
    
    <div class="otp-group">
      <input class="otp-box" maxlength="1" inputmode="numeric" id="o1" oninput="next(this,2)" onkeydown="prev(event,1)" autofocus>
      <input class="otp-box" maxlength="1" inputmode="numeric" id="o2" oninput="next(this,3)" onkeydown="prev(event,2)">
      <input class="otp-box" maxlength="1" inputmode="numeric" id="o3" oninput="next(this,4)" onkeydown="prev(event,3)">
      <input class="otp-box" maxlength="1" inputmode="numeric" id="o4" oninput="next(this,5)" onkeydown="prev(event,4)">
      <input class="otp-box" maxlength="1" inputmode="numeric" id="o5" oninput="next(this,6)" onkeydown="prev(event,5)">
      <input class="otp-box" maxlength="1" inputmode="numeric" id="o6" oninput="next(this,7)" onkeydown="prev(event,6)">
    </div>
    
    <button class="btn-auth" id="verifyBtn" onclick="doVerify()">✅ Verify & Complete</button>
    <button class="btn-outline" id="resendBtn" onclick="doResend()">🔄 Resend Code</button>
    <div class="timer" id="timerDisplay"></div>
    
    <div class="footer"><a href="register.html">← Back to Register</a></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
// Config
firebase.initializeApp({
  apiKey: "AIzaSyAoo2-X5ILICXR2mFAyUhqJYpvScChlsOc",
  authDomain: "earnnovabeta.firebaseapp.com",
  projectId: "earnnovabeta",
  storageBucket: "earnnovabeta.firebasestorage.app",
  messagingSenderId: "379345093425",
  appId: "1:379345093425:web:3b69314491b8db26b71aa3"
});
var db = firebase.firestore();
var auth = firebase.auth();
var currentUser = null;

// Params
var p = new URLSearchParams(window.location.search);
var email = p.get('email') || localStorage.getItem('en_otp_email') || '';
var uid = p.get('uid') || localStorage.getItem('en_otp_userId') || '';
var name = p.get('name') || localStorage.getItem('en_otp_name') || '';
var refCode = p.get('ref') || localStorage.getItem('en_otp_ref') || '';
var isNew = p.get('new') === '1';
var shouldResend = p.get('resend') === '1';

if (email) document.getElementById('emailDisplay').textContent = email;

// OTP nav
function next(el, n) {
  if (el.value) { el.classList.add('filled'); if (n <= 6) document.getElementById('o' + n)?.focus(); }
}
function prev(e, n) {
  if (e.key === 'Backspace' && !e.target.value && n > 1) document.getElementById('o' + (n-1))?.focus();
}

function getCode() {
  var c = '';
  for (var i = 1; i <= 6; i++) c += document.getElementById('o' + i)?.value || '';
  return c;
}

function showAlert(msg, t) {
  var el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = 'alert show ' + (t || 'error');
}

function clearAlert() { document.getElementById('alertBox').className = 'alert'; }

// ===== VERIFY OTP =====
function doVerify() {
  clearAlert();
  var code = getCode();
  if (code.length !== 6) { showAlert('⚠️ Enter the complete 6-digit code', 'error'); return; }
  
  var btn = document.getElementById('verifyBtn');
  btn.disabled = true; btn.textContent = '⏳ Verifying...';
  showAlert('🔍 Checking OTP...', 'info');
  
  var q = db.collection('otp_codes').where('code', '==', code).where('used', '==', false);
  if (email) q = q.where('email', '==', email);
  if (uid) q = q.where('userId', '==', uid);
  
  q.get().then(function(snap) {
    if (snap.empty) {
      showAlert('❌ Invalid OTP code. Try again.', 'error');
      btn.disabled = false; btn.textContent = '✅ Verify & Complete';
      return;
    }
    var doc = snap.docs[0], d = doc.data();
    var exp = d.expiresAt ? d.expiresAt.toDate() : new Date();
    if (Date.now() > exp.getTime()) {
      showAlert('⏰ OTP expired! Resend a new one.', 'error');
      db.collection('otp_codes').doc(doc.id).update({ used: true });
      btn.disabled = false; btn.textContent = '✅ Verify & Complete';
      return;
    }
    
    // ✅ OTP valid — create user doc for new registration
    if (isNew && uid) {
      var refCodeGen = Math.random().toString(36).substring(2, 10).toUpperCase();
      var userData = {
        uid: uid, email: email, name: name || '', photo: '', phone: '',
        balance: 0, totalEarned: 0, totalWithdrawn: 0,
        adsWatched: 0, todayAds: 0, lastAdDate: '',
        referralCode: refCodeGen, referredBy: '', referralBonusPaid: false,
        regIp: '0.0.0.0', isActive: true, emailVerified: true, otpVerified: true,
        isAdmin: email === 'owner@nova.com',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
      };
      
      // IP
      try { fetch('https://api.ipify.org?format=json').then(function(r){return r.json()}).then(function(ipd){userData.regIp=ipd.ip; saveAndFinish(doc.id, userData, refCodeGen);}).catch(function(){saveAndFinish(doc.id, userData, refCodeGen);}); } catch(e){saveAndFinish(doc.id, userData, refCodeGen);}
    } else {
      // Just mark OTP used
      db.collection('otp_codes').doc(doc.id).update({ used: true, verifiedAt: firebase.firestore.FieldValue.serverTimestamp() }).then(function() {
        finish();
      });
    }
  }).catch(function(err) {
    showAlert('❌ Error: ' + err.message, 'error');
    btn.disabled = false; btn.textContent = '✅ Verify & Complete';
  });
}

function saveAndFinish(docId, userData, refCodeGen) {
  // Handle referral
  var saveUser = function() { return db.collection('users').doc(uid).set(userData); };
  
  saveUser().then(function() {
    return db.collection('otp_codes').doc(docId).update({ used: true, verifiedAt: firebase.firestore.FieldValue.serverTimestamp() });
  }).then(function() {
    if (refCode) {
      return db.collection('users').where('referralCode', '==', refCode).get().then(function(rs) {
        if (!rs.empty) {
          var r = rs.docs[0];
          return db.collection('users').doc(r.id).update({ referralCount: firebase.firestore.FieldValue.increment(1) }).then(function() {
            return db.collection('referrals').add({ referrerId: r.id, referredId: uid, referredName: name || '', bonus: 0.50, bonusPaid: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
          });
        }
      });
    }
  }).then(function() { finish(); }).catch(function(err) {
    showAlert('❌ Error creating account: ' + err.message, 'error');
    document.getElementById('verifyBtn').disabled = false; document.getElementById('verifyBtn').textContent = '✅ Verify & Complete';
  });
}

function finish() {
  localStorage.setItem('en_otp_verified', 'true');
  localStorage.removeItem('en_otp_email');
  localStorage.removeItem('en_otp_userId');
  localStorage.removeItem('en_otp_name');
  localStorage.removeItem('en_otp_ref');
  
  document.getElementById('verifyBtn').textContent = '✅ Verified!';
  showAlert('✅ Email verified successfully!', 'success');
  
  setTimeout(function() { window.location.href = 'home.html'; }, 1500);
}

// ===== RESEND OTP =====
var cooldown = 0, timerInt = null;

function doResend() {
  if (cooldown > 0 && cooldown < 60) { showAlert('⏳ Wait ' + cooldown + 's', 'error'); return; }
  if (!email) { showAlert('⚠️ No email found', 'error'); return; }
  
  document.getElementById('resendBtn').disabled = true;
  document.getElementById('resendBtn').textContent = '⏳ Sending...';
  
  var code = String(Math.floor(100000 + Math.random() * 900000));
  db.collection('otp_codes').add({
    code: code, used: false, email: email, userId: uid || '',
    name: name || '', referralCode: refCode || '',
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    expiresAt: new Date(Date.now() + 10 * 60 * 1000)
  }).then(function() {
    console.log('📧 OTP to ' + email + ': ' + code + ' (NOT in URL - security)');
    showAlert('📨 New OTP sent to ' + email, 'info');
    document.getElementById('resendBtn').disabled = false;
    document.getElementById('resendBtn').textContent = '🔄 Resend Code';
    startTimer();
    for (var i = 1; i <= 6; i++) { var el = document.getElementById('o' + i); if (el) { el.value = ''; el.classList.remove('filled'); } }
    document.getElementById('o1')?.focus();
  }).catch(function(err) {
    showAlert('❌ ' + err.message, 'error');
    document.getElementById('resendBtn').disabled = false;
    document.getElementById('resendBtn').textContent = '🔄 Resend Code';
  });
}

function startTimer() {
  cooldown = 60;
  if (timerInt) clearInterval(timerInt);
  document.getElementById('timerDisplay').innerHTML = 'Resend in <strong>' + cooldown + 's</strong>';
  timerInt = setInterval(function() {
    cooldown--;
    document.getElementById('timerDisplay').innerHTML = cooldown > 0 ? 'Resend in <strong>' + cooldown + 's</strong>' : '';
    if (cooldown <= 0) clearInterval(timerInt);
  }, 1000);
}

// Auto-resend if ?resend=1
if (shouldResend && email) { setTimeout(doResend, 500); }

// Demo OTP generation
if (email && !localStorage.getItem('en_last_otp_' + email)) {
  var demoCode = String(Math.floor(100000 + Math.random() * 900000));
  db.collection('otp_codes').add({
    code: demoCode, used: false, email: email, userId: uid || 'demo',
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    expiresAt: new Date(Date.now() + 10 * 60 * 1000)
  }).then(function() {
    console.log('📱 OTP: ' + demoCode + ' (for ' + email + ')');
    localStorage.setItem('en_last_otp_' + email, demoCode);
    showAlert('📨 OTP sent! Check console for code.', 'info');
    startTimer();
  });
}

console.log('EARN NOVA — OTP Verify (secure: no code in URL)');
</script>
</body>
</html>
