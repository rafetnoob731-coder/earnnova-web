<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Verify OTP | EARN NOVA</title>
<style>
:root{--bg:#0F172A;--bg2:#0A0E1A;--gold:#d4af37;--emerald:#10B981;--text:#F0F0F4;--text-muted:rgba(240,240,244,0.4);--font:'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-wrap{width:100%;max-width:400px}
.auth-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(24px) saturate(140%);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:32px 24px;box-shadow:0 16px 80px rgba(0,0,0,0.3)}
.auth-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;margin:0 auto 16px;box-shadow:0 8px 32px rgba(16,185,129,0.2)}
.auth-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px}
.auth-subtitle{font-size:12px;color:rgba(255,255,255,0.4);text-align:center;margin:4px 0 20px;line-height:1.5}
.auth-subtitle strong{color:var(--gold)}
.otp-input-group{display:flex;gap:6px;justify-content:center;margin:16px 0}
.otp-input{width:44px;height:50px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#fff;font-size:22px;font-weight:700;text-align:center;outline:none;transition:0.2s;font-family:monospace}
.otp-input:focus{border-color:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,0.1)}
.otp-input.filled{border-color:rgba(16,185,129,0.2);background:rgba(16,185,129,0.04)}
.btn-auth{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:0.25s;margin-top:8px}
.btn-auth:hover{opacity:0.9;transform:translateY(-1px)}
.btn-auth:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-outline{width:100%;padding:12px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;transition:0.2s;margin-top:6px}
.btn-outline:hover{border-color:rgba(255,255,255,0.1);color:#fff}
.auth-alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none;text-align:center}
.auth-alert.show{display:block}
.auth-alert.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#FCA5A5}
.auth-alert.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#6EE7B7}
.auth-alert.info{background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.2);color:#FCD34D}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.3)}
.auth-footer a{color:#10B981;text-decoration:none;font-weight:600}
.timer-text{text-align:center;font-size:12px;color:rgba(255,255,255,0.3);margin-top:8px}
.timer-text strong{color:#d4af37}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">E</div>
    <div class="auth-title">📨 Verify Email</div>
    <div class="auth-subtitle">Enter the 6-digit code sent to<br><strong id="otpEmailDisplay">your email</strong></div>
    
    <div id="otpAlert" class="auth-alert"></div>
    
    <div class="otp-input-group">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp1" oninput="otpMove(this,2)" onkeydown="otpBack(event,1)" autofocus>
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp2" oninput="otpMove(this,3)" onkeydown="otpBack(event,2)">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp3" oninput="otpMove(this,4)" onkeydown="otpBack(event,3)">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp4" oninput="otpMove(this,5)" onkeydown="otpBack(event,4)">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp5" oninput="otpMove(this,6)" onkeydown="otpBack(event,5)">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp6" oninput="otpMove(this,7)" onkeydown="otpBack(event,6)">
    </div>
    
    <button class="btn-auth" id="verifyOTPBtn" onclick="verifyOTP()">✅ Verify & Complete</button>
    <button class="btn-outline" id="resendOTPBtn" onclick="resendOTP()">🔄 Resend Code</button>
    <div class="timer-text" id="otpTimer"></div>
    
    <div class="auth-footer">
      <a href="register.html">← Back to Register</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
// Firebase
firebase.initializeApp({
  apiKey: "AIzaSyAoo2-X5ILICXR2mFAyUhqJYpvScChlsOc",
  authDomain: "earnnovabeta.firebaseapp.com",
  projectId: "earnnovabeta",
  storageBucket: "earnnovabeta.firebasestorage.app",
  messagingSenderId: "379345093425",
  appId: "1:379345093425:web:3b69314491b8db26b71aa3"
});
var db = firebase.firestore();
var auth = firebase.auth();

// ===== GET DATA FROM URL / SESSION =====
var params = new URLSearchParams(window.location.search);
var email = params.get('email') || localStorage.getItem('en_otp_email') || '';
var userId = params.get('uid') || localStorage.getItem('en_otp_userId') || '';
var userName = params.get('name') || localStorage.getItem('en_otp_name') || '';
var referralCode = params.get('ref') || localStorage.getItem('en_otp_ref') || '';
var isNewUser = params.get('new') === '1';

if (email) document.getElementById('otpEmailDisplay').textContent = email;

// ===== OTP INPUT NAVIGATION =====
function otpMove(current, nextId) {
  if (current.value.length >= 1) {
    current.classList.add('filled');
    if (nextId <= 6) document.getElementById('otp' + nextId)?.focus();
  }
  var full = '';
  for (var i = 1; i <= 6; i++) {
    var v = document.getElementById('otp' + i)?.value || '';
    if (!v) return;
    full += v;
  }
}

function otpBack(event, prevId) {
  if (event.key === 'Backspace' && !event.target.value && prevId > 1) {
    document.getElementById('otp' + (prevId-1))?.focus();
  }
}

// ===== ALERT =====
function showAlert(msg, type) {
  var el = document.getElementById('otpAlert');
  el.textContent = msg;
  el.className = 'auth-alert show ' + (type || 'error');
}

function clearAlert() {
  document.getElementById('otpAlert').className = 'auth-alert';
}

// ===== VERIFY OTP =====
function verifyOTP() {
  clearAlert();
  
  var otpCode = '';
  for (var i = 1; i <= 6; i++) {
    otpCode += document.getElementById('otp' + i)?.value || '';
  }
  
  if (otpCode.length !== 6) {
    showAlert('⚠️ Enter the complete 6-digit code', 'error');
    return;
  }
  
  var btn = document.getElementById('verifyOTPBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Verifying...';
  
  showAlert('🔍 Checking OTP...', 'info');
  
  // Build query
  var query = db.collection('otp_codes')
    .where('code', '==', otpCode)
    .where('used', '==', false);
  
  if (email) query = query.where('email', '==', email);
  if (userId) query = query.where('userId', '==', userId);
  
  query.get().then(function(snap) {
    if (snap.empty) {
      showAlert('❌ Invalid OTP code. Check and try again.', 'error');
      btn.disabled = false;
      btn.textContent = '✅ Verify & Complete';
      return;
    }
    
    var doc = snap.docs[0];
    var data = doc.data();
    var expiry = data.expiresAt ? data.expiresAt.toDate() : new Date();
    
    if (Date.now() > expiry.getTime()) {
      showAlert('⏰ OTP expired! Request a new one.', 'error');
      db.collection('otp_codes').doc(doc.id).update({ used: true });
      btn.disabled = false;
      btn.textContent = '✅ Verify & Complete';
      return;
    }
    
    // ✅ OTP VALID
    // Mark as used
    db.collection('otp_codes').doc(doc.id).update({
      used: true,
      verifiedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function() {
      localStorage.setItem('en_otp_verified', 'true');
      localStorage.removeItem('en_otp_email');
      localStorage.removeItem('en_otp_userId');
      localStorage.removeItem('en_otp_name');
      
      btn.textContent = '✅ Verified!';
      showAlert('✅ Email verified!', 'success');
      
      // For new registration: redirect to home
      if (isNewUser && userId) {
        setTimeout(function() { window.location.href = 'home.html'; }, 1500);
      } else {
        // For existing users: redirect based on mode
        var mode = params.get('mode') || 'home';
        setTimeout(function() { window.location.href = mode + '.html'; }, 1500);
      }
    });
  }).catch(function(err) {
    showAlert('❌ Error: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = '✅ Verify & Complete';
  });
}

// ===== RESEND OTP =====
var otpCooldown = 0;
var otpTimerInterval = null;

function resendOTP() {
  if (otpCooldown > 0 && otpCooldown < 60) {
    showAlert('⏳ Please wait ' + otpCooldown + 's', 'error');
    return;
  }
  
  if (!email) {
    showAlert('⚠️ No email found. Please register again.', 'error');
    return;
  }
  
  document.getElementById('resendOTPBtn').disabled = true;
  document.getElementById('resendOTPBtn').textContent = '⏳ Sending...';
  
  var otpCode = String(Math.floor(100000 + Math.random() * 900000));
  var expiresAt = new Date(Date.now() + 10 * 60 * 1000);
  
  db.collection('otp_codes').add({
    code: otpCode, used: false, email: email,
    userId: userId || '',
    name: userName || '',
    referralCode: referralCode || '',
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    expiresAt: expiresAt
  }).then(function() {
    // Log to console (simulated email)
    console.log('========================================');
    console.log('📧 EMAIL OTP TO: ' + email);
    console.log('   OTP Code: ' + otpCode);
    console.log('   ⚠️ SECURITY: OTP is NOT in URL');
    console.log('   User must type it manually');
    console.log('========================================');
    
    localStorage.setItem('en_last_otp', otpCode);
    
    showAlert('📨 New OTP sent to ' + email, 'info');
    document.getElementById('resendOTPBtn').disabled = false;
    document.getElementById('resendOTPBtn').textContent = '🔄 Resend Code';
    startCooldown();
    
    // Clear inputs
    for (var i = 1; i <= 6; i++) {
      var inp = document.getElementById('otp' + i);
      if (inp) { inp.value = ''; inp.classList.remove('filled'); }
    }
    document.getElementById('otp1')?.focus();
  }).catch(function(err) {
    showAlert('❌ Error: ' + err.message, 'error');
    document.getElementById('resendOTPBtn').disabled = false;
    document.getElementById('resendOTPBtn').textContent = '🔄 Resend Code';
  });
}

function startCooldown() {
  otpCooldown = 60;
  if (otpTimerInterval) clearInterval(otpTimerInterval);
  document.getElementById('otpTimer').innerHTML = 'Resend in <strong>' + otpCooldown + 's</strong>';
  otpTimerInterval = setInterval(function() {
    otpCooldown--;
    if (otpCooldown <= 0) {
      clearInterval(otpTimerInterval);
      document.getElementById('otpTimer').innerHTML = 'You can resend now';
    } else {
      document.getElementById('otpTimer').innerHTML = 'Resend in <strong>' + otpCooldown + 's</strong>';
    }
  }, 1000);
}

// ===== AUTO GENERATE OTP FOR TESTING =====
setTimeout(function() {
  if (!email) {
    // Try from login state
    var user = auth.currentUser;
    if (user) {
      email = user.email;
      userId = user.uid;
      document.getElementById('otpEmailDisplay').textContent = email;
    }
  }
  // Auto-generate OTP for demo if none exists
  var stored = localStorage.getItem('en_last_otp');
  if (!stored) {
    var code = String(Math.floor(100000 + Math.random() * 900000));
    var expiresAt = new Date(Date.now() + 10 * 60 * 1000);
    db.collection('otp_codes').add({
      code: code, used: false, email: email || 'demo@earnnova.com',
      userId: userId || 'demo',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      expiresAt: expiresAt
    }).then(function() {
      console.log('📱 DEMO OTP Code: ' + code + ' (valid 10 min)');
      localStorage.setItem('en_last_otp', code);
      startCooldown();
    });
  }
}, 500);

console.log('📧 EARN NOVA OTP Verification');
console.log('🔒 OTP is NEVER in URL - manual entry only');
</script>
</body>
</html>
