<div class="main-content" id="mainContent">
  <!-- PAGE: WITHDRAW -->
  <div class="page-view" id="pageWithdraw">
    <div class="section-title" style="margin-top:0">💳 Withdraw Funds</div>
    <div class="section-subtitle">Minimum: $5.00 • 5% processing fee</div>

    <div class="glass-card glass-card-gold flex justify-between items-center" style="margin-top:12px">
      <div><div class="text-xs text-muted">Available Balance</div><div class="text-xl fw-800" data-balance>$0.00</div></div>
      <div class="text-xs text-muted">Min $5.00</div>
    </div>

    <div class="fw-600 text-sm mt-4 mb-3">Payment Method</div>
    <div class="wd-grid">
      <div class="wd-item" onclick="selectWDMethod('bkash')"><div class="wd-icon">📱</div><div class="wd-label">bKash</div></div>
      <div class="wd-item" onclick="selectWDMethod('nagad')"><div class="wd-icon">📱</div><div class="wd-label">Nagad</div></div>
      <div class="wd-item" onclick="selectWDMethod('binance')"><div class="wd-icon">💰</div><div class="wd-label">Binance</div></div>
      <div class="wd-item" onclick="selectWDMethod('paypal')"><div class="wd-icon">🌐</div><div class="wd-label">PayPal</div></div>
      <div class="wd-item" onclick="selectWDMethod('wise')"><div class="wd-icon">🏦</div><div class="wd-label">Wise</div></div>
      <div class="wd-item" onclick="selectWDMethod('bank')"><div class="wd-icon">🏛️</div><div class="wd-label">Bank</div></div>
      <div class="wd-item" onclick="selectWDMethod('crypto')"><div class="wd-icon">🔗</div><div class="wd-label">Crypto</div></div>
      <div class="wd-item" onclick="selectWDMethod('stripe')"><div class="wd-icon">💳</div><div class="wd-label">Stripe</div></div>
    </div>

    <div class="glass-card" id="wdForm" style="display:none">
      <div class="flex flex-col gap-3">
        <input class="wd-input" type="number" id="wdAmount" placeholder="Amount (min $5.00)" step="0.01" min="5">
        <div id="wdFields"></div>
        <button class="btn-emerald w-full" onclick="requestWithdrawal()">Request Withdrawal</button>
      </div>
    </div>

    <div class="section-title">📋 History</div>
    <div class="glass-card" id="wdHistory">
      <div class="empty-state"><div class="empty-desc">Loading...</div></div>
    </div>
  </div>

</div>
<button class="fab" onclick="location.href='earn.html'" title="Watch Ad">📺</button>
<div id="toast" class="toast"></div>
<div class="modal-overlay" id="userDetailModal" onclick="if(event.target===this)this.classList.remove('show')"><div class="modal-content" style="max-width:380px;padding:16px;border-radius:16px" id="userDetailContent"></div></div>
<div class="modal-overlay" id="adModal" onclick="if(event.target===this)closeAd()"><div class="ad-modal-content" id="adModalContent"></div></div>

<script>

  location.href = page + '.html';
}
</script>
